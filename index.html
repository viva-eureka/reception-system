/* ============================ ユーティリティ ============================ */
const uid = () => Math.random().toString(36).slice(2, 9);
const genCode = () => "VE-" + Math.random().toString(36).slice(2, 8).toUpperCase();
const fmtTime = (iso) => {
  const d = new Date(iso);
  return d.toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" });
};
const fmtDateTime = (iso) => {
  const d = new Date(iso);
  return d.toLocaleString("ja-JP", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
};
const nowISO = () => new Date().toISOString();

/* ============================ QRコード ============================ */
function QR({ text, size = 140 }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    ref.current.innerHTML = "";
    new QRCode(ref.current, { text, width: size, height: size, correctLevel: QRCode.CorrectLevel.M });
  }, [text, size]);
  return <div ref={ref} className="inline-block bg-white p-2 rounded-lg" />;
}

/* ============================ トースト（Google Chat通知の演出） ============================ */
function ChatToast({ toast }) {
  if (!toast) return null;
  return (
    <div className="fixed top-5 right-5 z-50 slidein">
      <div className="w-80 bg-white rounded-xl shadow-2xl border border-slate-200 overflow-hidden">
        <div className="flex items-center gap-2 px-4 py-2 bg-[#1a73e8] text-white text-sm font-medium">
          <span className="text-lg">💬</span> Google Chat 通知（送信しました）
        </div>
        <div className="px-4 py-3 text-sm text-slate-700 whitespace-pre-line">{toast}</div>
      </div>
    </div>
  );
}

/* ============================ 受付端末（キオスク） ============================ */
function Kiosk({ db, setDB, notify, forceClosed }) {
  const [screen, setScreen] = useState("standby"); // standby|menu|visitor|keyboard|done
  const [clock, setClock] = useState(new Date());
  const [doneMsg, setDoneMsg] = useState("");
  const [nameInput, setNameInput] = useState("");
  const [companyInput, setCompanyInput] = useState("");
  const [pickerOpen, setPickerOpen] = useState(false);
  const [cardStep, setCardStep] = useState("camera"); // camera | scanning | review
  const [cardName, setCardName] = useState("");
  const [cardCompany, setCardCompany] = useState("");

  useEffect(() => {
    const t = setInterval(() => setClock(new Date()), 1000);
    return () => clearInterval(t);
  }, []);

  const todayBH = () => {
    const bh = db.settings.businessHours || DEFAULT_BUSINESS_HOURS;
    const jsDay = clock.getDay(); // 0=Sun … 6=Sat
    const idx = jsDay === 0 ? 6 : jsDay - 1; // 0=月…6=日
    return bh[idx] || bh[0];
  };
  const isOpen = () => {
    if (forceClosed) return false;
    const today = todayBH();
    if (!today.enabled) return false;
    const cur = clock.toTimeString().slice(0, 5);
    return cur >= today.open && cur <= today.close;
  };

  const greeting = () => {
    const h = clock.getHours();
    if (h < 5) return { jp: "おそくまでお疲れさまです", en: "GOOD EVENING" };
    if (h < 11) return { jp: "おはようございます", en: "GOOD MORNING" };
    if (h < 17) return { jp: "ようこそお越しくださいました", en: "WELCOME" };
    return { jp: "こんばんは", en: "GOOD EVENING" };
  };

  const addLog = (entry) => {
    const next = { ...db, logs: [{ id: uid(), ts: nowISO(), action: "入館", ...entry }, ...db.logs] };
    setDB(next);
  };

  const goDone = (msg, chatMsg) => {
    setDoneMsg(msg);
    setScreen("done");
    notify(chatMsg);
    setTimeout(() => setScreen("standby"), 4500);
  };

  const handleDelivery = () => {
    addLog({ name: "配送業者", company: "", type: "delivery", host: "" });
    goDone(
      "受付ありがとうございます。\n担当者がまいりますので少々お待ちください。",
      "📦 配送業者が受付に到着しました\n受付時刻: " + fmtTime(nowISO())
    );
  };

  const handleQRScan = (inv) => {
    setPickerOpen(false);
    const next = {
      ...db,
      invitations: db.invitations.map((i) => i.id === inv.id ? { ...i, used: true } : i),
      logs: [{ id: uid(), ts: nowISO(), action: "入館", name: inv.visitorName, company: inv.company,
               type: "visitor", host: inv.host }, ...db.logs],
    };
    setDB(next);
    goDone(
      welcomeMsg(inv.company, inv.visitorName),
      "🙋 来訪者が受付に到着しました\n氏名: " + inv.visitorName + "（" + inv.company + "）\n担当: " +
      inv.host + " さん\n会議室: " + (inv.room || "未設定") + "\n受付時刻: " + fmtTime(nowISO())
    );
  };

  const handleKeyboard = () => {
    if (!nameInput.trim()) return;
    addLog({ name: nameInput.trim(), company: companyInput.trim(), type: "visitor", host: "（受付入力）" });
    goDone(
      nameInput.trim() + " 様、ようこそお越しくださいました。\n担当者へお取り次ぎいたします。",
      "🙋 来訪者が受付に到着しました（キーボード入力）\n氏名: " + nameInput.trim() +
      (companyInput.trim() ? "（" + companyInput.trim() + "）" : "") + "\n受付時刻: " + fmtTime(nowISO())
    );
    setNameInput(""); setCompanyInput("");
  };

  // 名刺撮影 → OCR（デモ：読み取り結果をシミュレート）
  const sampleCards = [
    { name: "田中 大輔", company: "株式会社グローバルテック" },
    { name: "高橋 美咲", company: "みらい設計事務所" },
    { name: "渡辺 隆", company: "株式会社ニッポン物産" },
  ];
  const captureCard = () => {
    setCardStep("scanning");
    const pick = sampleCards[clock.getSeconds() % sampleCards.length];
    setTimeout(() => {
      setCardName(pick.name);
      setCardCompany(pick.company);
      setCardStep("review");
    }, 1600);
  };
  const handleCard = () => {
    if (!cardName.trim()) return;
    addLog({ name: cardName.trim(), company: cardCompany.trim(), type: "visitor", host: "（名刺受付）" });
    goDone(
      welcomeMsg(cardCompany.trim(), cardName.trim()),
      "🙋 来訪者が受付に到着しました（名刺受付）\n氏名: " + cardName.trim() +
      (cardCompany.trim() ? "（" + cardCompany.trim() + "）" : "") + "\n受付時刻: " + fmtTime(nowISO())
    );
    setCardName(""); setCardCompany("");
  };

  // 受付完了時のあいさつ文（プライバシー設定を反映）
  const welcomeMsg = (company, name) => {
    const mode = db.settings.greetingMode || "name";
    if (mode === "generic") return "ようこそお越しくださいました。\n担当者へお取り次ぎいたします。";
    if (mode === "full" && company)
      return "いらっしゃいませ\n" + company + "\n" + name + " 様\n\n担当者がまいります。少々お待ちください。";
    return "いらっしゃいませ\n" + name + " 様\n\n担当者がまいります。少々お待ちください。";
  };

  /* ---- 営業時間外 ---- */
  if (!isOpen() && screen === "standby") {
    const allowAfter = db.settings.afterHoursReception;
    return (
      <KioskShell bg={THEMES[db.settings.bgTheme || "obsidian"].bg} onClick={allowAfter ? () => setScreen("menu") : undefined}>
        <div className="flex-1 flex flex-col items-center justify-center text-center text-white px-10">
          <div className="text-5xl mb-6">🌙</div>
          <div className="text-3xl font-bold mb-3">ただいま営業時間外です</div>
          <div className="text-slate-300 text-lg">
            受付時間 {db.settings.openTime} 〜 {db.settings.closeTime}
          </div>
          <div className="text-slate-400 text-sm mt-2">
            {(() => { const t = todayBH(); return t.enabled ? `受付時間 ${t.open} 〜 ${t.close}` : "本日は定休日です"; })()}
          </div>
          {allowAfter && (
            <div className="mt-8 px-6 py-3 rounded-full bg-white/10 border border-white/20 text-sm cursor-pointer">
              画面をタップして受付を開始
            </div>
          )}
          <div className="mt-6 text-slate-400 text-xs">{db.settings.companyName}</div>
        </div>
      </KioskShell>
    );
  }

  /* ---- 待ち受け ---- */
  if (screen === "standby") {
    const th = THEMES[db.settings.bgTheme || "obsidian"];
    return (
      <KioskShell bg={th.bg}>
        <StandbyDecor theme={th} />
        <div className="relative z-10 flex-1 flex flex-col items-center justify-center text-center px-10 cursor-pointer select-none" onClick={() => setScreen("menu")}>
          {/* あいさつ */}
          <div className={"fadeup flex items-center gap-3 mb-0.5"}>
            <span className={"h-px w-6 " + th.lineColor} />
            <span className={th.greetEn}>{greeting().en}</span>
            <span className={"h-px w-6 " + th.lineColor} />
          </div>
          <div className={"fadeup mb-7 " + th.greetJp}>{greeting().jp}</div>

          {/* ロゴ */}
          <div className="fadeup-2 floaty rounded-3xl px-10 py-7 mb-8"
               style={{ background: th.logoCard.bg, boxShadow: th.logoCard.shadow }}>
            <Logo width={360} />
          </div>

          {/* 時計 */}
          <div className="fadeup-3 flex items-end gap-1 tabular-nums leading-none">
            <span className={"text-8xl tracking-tight " + th.clock}>
              {clock.toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" })}
            </span>
            <span className={"text-2xl mb-2.5 w-9 text-left font-light " + th.clockSub}>
              {String(clock.getSeconds()).padStart(2, "0")}
            </span>
          </div>
          <div className={"fadeup-3 mt-3 " + th.date}>
            {clock.toLocaleDateString("ja-JP", { year: "numeric", month: "long", day: "numeric", weekday: "long" })}
          </div>

          {/* 開始ボタン */}
          <div className="fadeup-4 mt-12 px-10 py-4 rounded-full text-base font-medium flex items-center gap-3 cursor-pointer"
               style={{ background: `linear-gradient(to right, ${th.btn.from}, ${th.btn.to})`,
                        boxShadow: `0 0 0 0 ${th.btn.glow}, 0 8px 30px rgba(0,0,0,.4)`,
                        animation: `glowpulse 2.6s ease-in-out infinite` }}>
            <span>👆</span>
            <span className={th.btn.shine}>画面をタップして受付を開始</span>
          </div>
          <div className={"fadeup-4 text-xs mt-5 " + th.footer}>RECEPTION · ユリーカ</div>
        </div>
      </KioskShell>
    );
  }

  /* ---- メニュー ---- */
  if (screen === "menu") {
    const btns = (db.settings.receptionButtons || DEFAULT_BUTTONS);
    const cols = btns.length <= 2 ? "grid-cols-2" : btns.length === 3 ? "grid-cols-3" : "grid-cols-2";
    return (
      <KioskShell>
        <Header title="ご用件をお選びください" onBack={() => setScreen("standby")} />
        <div className={"flex-1 grid " + cols + " gap-5 p-8"}>
          {btns.map(btn => (
            <BigButton key={btn.id} emoji={btn.emoji} label={btn.label} sub={btn.sub} color={btn.color}
              onClick={() => {
                if (btn.type === "delivery") handleDelivery();
                else if (btn.type === "visitor") setScreen("visitor");
                else {
                  addLog({ name: "（その他）", company: "", type: "custom", host: btn.label });
                  goDone("担当者へご連絡いたします。\n少々お待ちください。",
                    "🔔 " + btn.label + "\n受付時刻: " + fmtTime(nowISO()));
                }
              }} />
          ))}
        </div>
      </KioskShell>
    );
  }

  /* ---- 来訪者: QR / キーボード 選択 ---- */
  if (screen === "visitor") {
    return (
      <KioskShell>
        <Header title="受付方法をお選びください" onBack={() => setScreen("menu")} />
        <div className="flex-1 grid grid-cols-3 gap-4 p-8">
          <BigButton emoji="📷" label="QRコードをかざす" sub="招待メールのQRを読み取ります"
            color="from-emerald-400 to-teal-500" onClick={() => setPickerOpen(true)} />
          <BigButton emoji="💳" label="名刺を撮影" sub="名刺をかざすと自動で読み取ります"
            color="from-sky-400 to-blue-500" onClick={() => { setCardStep("camera"); setScreen("card"); }} />
          <BigButton emoji="⌨️" label="お名前を入力" sub="キーボードで受付します"
            color="from-violet-400 to-purple-500" onClick={() => setScreen("keyboard")} />
        </div>

        {pickerOpen && (
          <div className="absolute inset-0 bg-black/60 flex items-center justify-center p-8 pop"
               onClick={() => setPickerOpen(false)}>
            <div className="bg-white rounded-2xl p-6 w-full max-w-md" onClick={(e) => e.stopPropagation()}>
              <div className="flex items-center gap-2 text-slate-800 font-bold text-lg mb-1">
                📷 QRスキャン（デモ）
              </div>
              <p className="text-sm text-slate-500 mb-4">
                実機ではカメラでQRを自動読取します。デモ用に招待客を選んでください。
              </p>
              <div className="space-y-2">
                {db.invitations.filter((i) => !i.used).map((i) => (
                  <button key={i.id} onClick={() => handleQRScan(i)}
                    className="w-full text-left px-4 py-3 rounded-xl border border-slate-200 hover:bg-sky-50 hover:border-sky-300 transition">
                    <div className="font-semibold text-slate-800">{i.visitorName} 様</div>
                    <div className="text-xs text-slate-500">{i.company} ／ 担当: {i.host} ／ {i.room}</div>
                  </button>
                ))}
                {db.invitations.filter((i) => !i.used).length === 0 && (
                  <div className="text-sm text-slate-400 py-6 text-center">
                    受付可能な招待がありません。<br />管理画面で招待を作成してください。
                  </div>
                )}
              </div>
            </div>
          </div>
        )}
      </KioskShell>
    );
  }

  /* ---- 名刺撮影 ---- */
  if (screen === "card") {
    return (
      <KioskShell>
        <Header title="名刺を撮影してください" onBack={() => setScreen("visitor")} />
        <div className="flex-1 p-8 flex flex-col items-center justify-center">
          {cardStep !== "review" && (
            <>
              <div className="relative w-[460px] max-w-full aspect-[1.7/1] rounded-2xl bg-slate-950 border border-white/10 overflow-hidden flex items-center justify-center">
                {/* ガイド枠 */}
                <div className="absolute inset-6 rounded-xl border-2 border-dashed border-sky-400/50" />
                <Corner pos="top-3 left-3" /><Corner pos="top-3 right-3 rotate-90" />
                <Corner pos="bottom-3 left-3 -rotate-90" /><Corner pos="bottom-3 right-3 rotate-180" />
                {/* 名刺プレビュー風 */}
                <div className="w-[78%] aspect-[1.7/1] rounded-lg bg-gradient-to-br from-slate-100 to-slate-300 shadow-lg flex flex-col justify-center px-5">
                  <div className="h-2 w-20 bg-slate-400 rounded mb-2" />
                  <div className="h-3 w-32 bg-slate-600 rounded mb-1" />
                  <div className="h-2 w-24 bg-slate-400 rounded" />
                </div>
                {cardStep === "scanning" && (
                  <div className="absolute inset-0 bg-black/50 flex flex-col items-center justify-center text-white">
                    <div className="w-10 h-10 border-4 border-sky-400 border-t-transparent rounded-full animate-spin mb-3" />
                    <div className="text-sm tracking-widest">読み取り中…</div>
                  </div>
                )}
              </div>
              <p className="text-slate-400 text-sm mt-4">枠内に名刺を置いてください（実機ではカメラで自動認識）</p>
              <button onClick={captureCard} disabled={cardStep === "scanning"}
                className="mt-6 px-10 py-4 rounded-full bg-gradient-to-r from-sky-500 to-blue-500 text-white text-xl font-bold disabled:opacity-50 flex items-center gap-2">
                📸 撮影する
              </button>
            </>
          )}

          {cardStep === "review" && (
            <div className="w-full max-w-md pop">
              <div className="text-emerald-300 text-sm mb-3 flex items-center gap-2">
                ✓ 名刺を読み取りました。内容をご確認ください
              </div>
              <div className="space-y-4">
                <div>
                  <label className="text-slate-300 text-sm">お名前 *</label>
                  <input value={cardName} onChange={(e) => setCardName(e.target.value)}
                    className="w-full mt-1 px-4 py-3 rounded-xl bg-white/10 text-white text-lg border border-white/20 focus:border-sky-400 outline-none" />
                </div>
                <div>
                  <label className="text-slate-300 text-sm">会社名</label>
                  <input value={cardCompany} onChange={(e) => setCardCompany(e.target.value)}
                    className="w-full mt-1 px-4 py-3 rounded-xl bg-white/10 text-white text-lg border border-white/20 focus:border-sky-400 outline-none" />
                </div>
                <div className="flex gap-3 pt-1">
                  <button onClick={() => setCardStep("camera")}
                    className="px-5 py-4 rounded-xl bg-white/10 text-white border border-white/20">撮り直す</button>
                  <button onClick={handleCard} disabled={!cardName.trim()}
                    className="flex-1 py-4 rounded-xl bg-gradient-to-r from-sky-400 to-indigo-500 text-white text-xl font-bold disabled:opacity-40">
                    受付する
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      </KioskShell>
    );
  }

  /* ---- キーボード入力 ---- */
  if (screen === "keyboard") {
    return (
      <KioskShell>
        <Header title="お名前をご入力ください" onBack={() => setScreen("visitor")} />
        <div className="flex-1 p-10 flex flex-col items-center">
          <div className="w-full max-w-md space-y-4">
            <div>
              <label className="text-slate-300 text-sm">お名前 *</label>
              <input value={nameInput} onChange={(e) => setNameInput(e.target.value)} autoFocus
                placeholder="山田 太郎"
                className="w-full mt-1 px-4 py-3 rounded-xl bg-white/10 text-white text-lg border border-white/20 focus:border-sky-400 outline-none" />
            </div>
            <div>
              <label className="text-slate-300 text-sm">会社名（任意）</label>
              <input value={companyInput} onChange={(e) => setCompanyInput(e.target.value)}
                placeholder="株式会社サンプル"
                className="w-full mt-1 px-4 py-3 rounded-xl bg-white/10 text-white text-lg border border-white/20 focus:border-sky-400 outline-none" />
            </div>
            <button onClick={handleKeyboard} disabled={!nameInput.trim()}
              className="w-full py-4 rounded-xl bg-gradient-to-r from-sky-400 to-indigo-500 text-white text-xl font-bold disabled:opacity-40 mt-2">
              受付する
            </button>
          </div>
        </div>
      </KioskShell>
    );
  }

  /* ---- 受付完了 ---- */
  if (screen === "done") {
    return (
      <KioskShell>
        <div className="flex-1 flex flex-col items-center justify-center text-center text-white px-10 pop">
          <div className="w-24 h-24 rounded-full bg-emerald-500 flex items-center justify-center text-5xl mb-6">✓</div>
          <div className="text-3xl font-bold mb-4">受付が完了しました</div>
          <div className="text-slate-200 text-lg whitespace-pre-line leading-relaxed">{doneMsg}</div>
          <div className="mt-10 text-sky-300 text-sm">💬 担当者へ通知しました</div>
        </div>
      </KioskShell>
    );
  }
  return null;
}

function KioskShell({ children, onClick, bg }) {
  return (
    <div onClick={onClick}
      className="relative w-full h-full flex flex-col overflow-hidden"
      style={{ background: bg || "linear-gradient(160deg,#050a14,#0a1428)" }}>
      {children}
    </div>
  );
}

function StandbyDecor({ theme: th }) {
  return (
    <div className="absolute inset-0 overflow-hidden pointer-events-none">
      {th.blobs.map((b, i) => (
        <div key={i} className="blob" style={{
          width: b.w, height: b.h,
          top: b.top, left: b.left, bottom: b.bottom, right: b.right,
          background: `radial-gradient(circle, ${b.color}, transparent 70%)`,
          animation: `slowdrift ${b.spd} ease-in-out infinite`,
        }} />
      ))}
    </div>
  );
}
function Header({ title, onBack }) {
  return (
    <div className="flex items-center gap-3 px-6 py-5 border-b border-white/10">
      <button onClick={onBack}
        className="w-10 h-10 rounded-full bg-white/10 text-white flex items-center justify-center text-xl">←</button>
      <div className="text-white text-xl font-bold">{title}</div>
    </div>
  );
}
function Corner({ pos }) {
  return <div className={"absolute w-6 h-6 border-t-2 border-l-2 border-sky-400 " + pos} />;
}
function BigButton({ emoji, label, sub, color, onClick }) {
  return (
    <button onClick={onClick}
      className={"rounded-3xl bg-gradient-to-br " + color + " text-white flex flex-col items-center justify-center p-6 shadow-xl active:scale-95 transition"}>
      <div className="text-6xl mb-4">{emoji}</div>
      <div className="text-2xl font-bold">{label}</div>
      <div className="text-sm opacity-90 mt-2 text-center">{sub}</div>
    </button>
  );
}

        {tabs.map(([k, label, icon]) => (

function Card({ children, className = "" }) {
  return <div className={"bg-white rounded-2xl border border-slate-200 shadow-sm " + className}>{children}</div>;
}

function Dashboard({ db }) {
  const today = "2026-06-05";
  const visitorsIn = db.logs.filter((l) => l.action === "入館" && l.type === "visitor").length;
  const deliveries = db.logs.filter((l) => l.type === "delivery").length;
  const inBuilding = db.logs.filter((l) => l.type === "visitor")
    .reduce((acc, l) => { acc[l.name] = l.action; return acc; }, {});
  const currentlyIn = Object.values(inBuilding).filter((a) => a === "入館").length;
  return (
    <div>
      <h1 className="text-2xl font-bold text-slate-800 mb-6">ダッシュボード</h1>
      <div className="grid grid-cols-4 gap-4 mb-8">
        <Stat label="本日の来訪者" value={visitorsIn} unit="名" color="text-sky-600" />
        <Stat label="配送受付" value={deliveries} unit="件" color="text-amber-600" />
        <Stat label="現在 在館中" value={currentlyIn} unit="名" color="text-emerald-600" />
        <Stat label="本日の招待" value={db.invitations.length} unit="件" color="text-violet-600" />
      </div>
      <Card className="p-6">
        <h2 className="font-bold text-slate-700 mb-4">直近の動き</h2>
        <div className="space-y-2">
          {db.logs.slice(0, 6).map((l) => (
            <div key={l.id} className="flex items-center gap-3 text-sm">
              <span className={"w-2 h-2 rounded-full " + (l.action === "入館" ? "bg-emerald-500" : "bg-slate-300")} />
              <span className="text-slate-400 w-16">{fmtTime(l.ts)}</span>
              <span className="font-medium text-slate-700">{l.name}</span>
              {l.company && <span className="text-slate-400">{l.company}</span>}
              <span className={"ml-auto text-xs px-2 py-0.5 rounded-full " +
                (l.type === "delivery" ? "bg-amber-100 text-amber-700" : "bg-sky-100 text-sky-700")}>
                {l.type === "delivery" ? "配送" : "来訪"} / {l.action}
              </span>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}
function Stat({ label, value, unit, color }) {
  return (
    <Card className="p-5">
      <div className="text-slate-500 text-sm">{label}</div>
      <div className={"text-3xl font-bold mt-1 " + color}>{value}<span className="text-base font-normal text-slate-400 ml-1">{unit}</span></div>
    </Card>
  );
}

const ALL_COLUMNS = [
  { key: "ts",      label: "時刻",  always: true },
  { key: "name",    label: "氏名",  always: true },
  { key: "company", label: "会社" },
  { key: "type",    label: "区分" },
  { key: "action",  label: "動作" },
  { key: "host",    label: "担当" },
  { key: "count",   label: "人数" },
  { key: "memo",    label: "メモ" },
];

function Logs({ db, setDB, notify }) {
  const [visibleCols, setVisibleCols] = useState(
    Object.fromEntries(ALL_COLUMNS.map(c => [c.key, c.always || ["ts","name","company","type","action","host"].includes(c.key)]))
  );
  const [colPickerOpen, setColPickerOpen] = useState(false);

  const checkout = (log) => {
    const next = { ...db, logs: [{ id: uid(), ts: nowISO(), action: "退館", name: log.name,
      company: log.company, type: log.type, host: log.host }, ...db.logs] };
    setDB(next);
    notify("👋 退館しました\n氏名: " + log.name + "\n退館時刻: " + fmtTime(nowISO()));
  };

  const exportCSV = () => {
    const cols = ALL_COLUMNS.filter(c => visibleCols[c.key]);
    const header = cols.map(c => c.label).join(",");
    const rows = db.logs.map(l => cols.map(c => {
      if (c.key === "ts") return '"' + fmtDateTime(l.ts) + '"';
      if (c.key === "type") return l.type === "delivery" ? "配送" : "来訪";
      return '"' + (l[c.key] || "") + '"';
    }).join(","));
    const csv = "﻿" + [header, ...rows].join("\n");
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([csv], { type: "text/csv" }));
    a.download = "入退館記録_" + new Date().toISOString().slice(0,10) + ".csv";
    a.click();
  };

  const status = {};
  [...db.logs].reverse().forEach((l) => { status[l.name] = l.action; });
  const cols = ALL_COLUMNS.filter(c => visibleCols[c.key]);

  return (
    <div>
      <div className="flex items-center justify-between mb-6">
        <h1 className="text-2xl font-bold text-slate-800">入退館記録</h1>
        <div className="flex gap-2 relative">
          <button onClick={() => setColPickerOpen(v => !v)}
            className="text-sm px-4 py-2 rounded-lg border border-slate-200 hover:bg-slate-50 flex items-center gap-1">
            ☰ 表示項目
          </button>
          <button onClick={exportCSV}
            className="text-sm px-4 py-2 rounded-lg bg-slate-800 text-white hover:bg-slate-700 flex items-center gap-1">
            ↓ CSVダウンロード
          </button>
          {colPickerOpen && (
            <div className="absolute right-0 top-10 bg-white rounded-xl shadow-xl border border-slate-200 p-4 z-20 w-52 slidein">
              <div className="text-xs font-bold text-slate-500 mb-3">表示する列を選択</div>
              {ALL_COLUMNS.map(c => (
                <label key={c.key} className="flex items-center gap-2 py-1.5 cursor-pointer">
                  <input type="checkbox" checked={!!visibleCols[c.key]} disabled={c.always}
                    onChange={() => setVisibleCols(v => ({ ...v, [c.key]: !v[c.key] }))} />
                  <span className="text-sm text-slate-700">{c.label}</span>
                  {c.always && <span className="text-xs text-slate-400 ml-auto">固定</span>}
                </label>
              ))}
            </div>
          )}
        </div>
      </div>
      <Card className="overflow-hidden">
        <table className="w-full text-sm">
          <thead className="bg-slate-50 text-slate-500">
            <tr>
              {cols.map(c => <th key={c.key} className="text-left px-4 py-3">{c.label}</th>)}
              <th className="px-4 py-3"></th>
            </tr>
          </thead>
          <tbody>
            {db.logs.map((l) => (
              <tr key={l.id} className="border-t border-slate-100">
                {cols.map(c => (
                  <td key={c.key} className="px-4 py-3">
                    {c.key === "ts" && <span className="text-slate-500">{fmtDateTime(l.ts)}</span>}
                    {c.key === "name" && <span className="font-medium text-slate-800">{l.name}</span>}
                    {c.key === "company" && <span className="text-slate-500">{l.company || "—"}</span>}
                    {c.key === "type" && (
                      <span className={"text-xs px-2 py-0.5 rounded-full " +
                        (l.type === "delivery" ? "bg-amber-100 text-amber-700" : "bg-sky-100 text-sky-700")}>
                        {l.type === "delivery" ? "配送" : "来訪"}
                      </span>
                    )}
                    {c.key === "action" && (
                      <span className={l.action === "入館" ? "text-emerald-600 font-medium" : "text-slate-400"}>{l.action}</span>
                    )}
                    {c.key === "host" && <span className="text-slate-500">{l.host || "—"}</span>}
                    {c.key === "count" && <span className="text-slate-500">—</span>}
                    {c.key === "memo" && <span className="text-slate-400 text-xs italic">—</span>}
                  </td>
                ))}
                <td className="px-4 py-3 text-right">
                  {l.type === "visitor" && status[l.name] === "入館" && (
                    <button onClick={() => checkout(l)}
                      className="text-xs px-3 py-1 rounded-full bg-slate-800 text-white hover:bg-slate-700">退館にする</button>
                  )}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>
    </div>
  );
}

function Invites({ db, setDB, notify }) {
  const [form, setForm] = useState({ visitorName: "", company: "", host: "", date: "2026-06-05",
    time: "14:00", room: db.settings.rooms[0], email: "" });
  const [created, setCreated] = useState(null);

  const create = () => {
    if (!form.visitorName.trim()) return;
    const inv = { id: uid(), code: genCode(), ...form, emailSent: false, used: false };
    setDB({ ...db, invitations: [inv, ...db.invitations] });
    setCreated(inv);
    setForm({ visitorName: "", company: "", host: "", date: "2026-06-05", time: "14:00",
      room: db.settings.rooms[0], email: "" });
  };
  const sendEmail = (inv) => {
    setDB({ ...db, invitations: db.invitations.map((i) => i.id === inv.id ? { ...i, emailSent: true } : i) });
    notify("✉️ 招待メールを送信しました（デモ）\n宛先: " + (inv.email || inv.visitorName) +
      "\nQRコード添付済 / 会議室: " + inv.room);
  };
  const remove = (id) => setDB({ ...db, invitations: db.invitations.filter((i) => i.id !== id) });

  return (
    <div>
      <h1 className="text-2xl font-bold text-slate-800 mb-6">招待管理</h1>
      <div className="grid grid-cols-3 gap-6">
        <Card className="p-6 col-span-1 h-fit">
          <h2 className="font-bold text-slate-700 mb-4">新規招待を作成</h2>
          <div className="space-y-3 text-sm">
            <Field label="来訪者名 *" value={form.visitorName} onChange={(v) => setForm({ ...form, visitorName: v })} />
            <Field label="会社名" value={form.company} onChange={(v) => setForm({ ...form, company: v })} />
            <Field label="メールアドレス" value={form.email} onChange={(v) => setForm({ ...form, email: v })} />
            <Field label="担当者" value={form.host} onChange={(v) => setForm({ ...form, host: v })} />
            <div className="grid grid-cols-2 gap-2">
              <Field label="日付" type="date" value={form.date} onChange={(v) => setForm({ ...form, date: v })} />
              <Field label="時刻" type="time" value={form.time} onChange={(v) => setForm({ ...form, time: v })} />
            </div>
            <div>
              <label className="text-slate-500">会議室</label>
              <select value={form.room} onChange={(e) => setForm({ ...form, room: e.target.value })}
                className="w-full mt-1 px-3 py-2 rounded-lg border border-slate-200 outline-none focus:border-sky-400">
                {db.settings.rooms.map((r) => <option key={r}>{r}</option>)}
              </select>
            </div>
            <div className="flex items-center gap-2 text-xs text-slate-400 pt-1">
              <span>📅</span> 作成時にGoogleカレンダー＋会議室を仮押さえ（デモ表示）
            </div>
            <button onClick={create} disabled={!form.visitorName.trim()}
              className="w-full py-2.5 rounded-lg bg-sky-500 text-white font-bold disabled:opacity-40 mt-1">
              招待を作成
            </button>
          </div>
        </Card>

        <div className="col-span-2 space-y-3">
          {created && (
            <Card className="p-5 border-emerald-300 bg-emerald-50/50 pop">
              <div className="flex gap-5 items-center">
                <QR text={created.code} size={110} />
                <div className="flex-1">
                  <div className="text-emerald-700 font-bold mb-1">✓ 招待を作成しました</div>
                  <div className="text-sm text-slate-600">
                    {created.visitorName} 様 / {created.date} {created.time} / {created.room}
                  </div>
                  <div className="text-xs text-slate-400 mt-1">受付コード: {created.code}</div>
                  <div className="text-xs text-slate-500 mt-2">📅 カレンダー登録 & 会議室予約 完了（デモ）</div>
                  <button onClick={() => { sendEmail(created); setCreated(null); }}
                    className="mt-3 px-4 py-2 rounded-lg bg-[#1a73e8] text-white text-sm font-medium">
                    ✉️ 招待メールを送信（QR添付）
                  </button>
                </div>
              </div>
            </Card>
          )}
          {db.invitations.map((i) => (
            <Card key={i.id} className="p-4 flex items-center gap-4">
              <QR text={i.code} size={70} />
              <div className="flex-1">
                <div className="font-semibold text-slate-800">{i.visitorName} 様
                  {i.used && <span className="ml-2 text-xs px-2 py-0.5 rounded-full bg-slate-200 text-slate-500">受付済</span>}
                </div>
                <div className="text-xs text-slate-500">{i.company} ／ 担当: {i.host || "—"}</div>
                <div className="text-xs text-slate-400">{i.date} {i.time} ／ {i.room} ／ {i.code}</div>
              </div>
              <div className="flex flex-col gap-2">
                {i.emailSent
                  ? <span className="text-xs text-emerald-600">✓ 送信済</span>
                  : <button onClick={() => sendEmail(i)} className="text-xs px-3 py-1 rounded-full bg-[#1a73e8] text-white">メール送信</button>}
                <button onClick={() => remove(i.id)} className="text-xs text-slate-400 hover:text-red-500">削除</button>
              </div>
            </Card>
          ))}
        </div>
      </div>
    </div>
  );
}
function Field({ label, value, onChange, type = "text" }) {
  return (
    <div>
      <label className="text-slate-500">{label}</label>
      <input type={type} value={value} onChange={(e) => onChange(e.target.value)}
        className="w-full mt-1 px-3 py-2 rounded-lg border border-slate-200 outline-none focus:border-sky-400" />
    </div>
  );
}

function Settings({ db, setDB }) {
  const s = db.settings;
  const set = (patch) => setDB({ ...db, settings: { ...s, ...patch } });
  const [roomInput, setRoomInput] = useState("");
  const [btnForm, setBtnForm] = useState({ label: "", sub: "", emoji: "🔔", color: BTN_COLORS[0].val, type: "custom" });
  const [addingBtn, setAddingBtn] = useState(false);

  const bh = s.businessHours || DEFAULT_BUSINESS_HOURS;
  const setBH = (idx, patch) => {
    const next = bh.map((row, i) => i === idx ? { ...row, ...patch } : row);
    set({ businessHours: next });
  };

  const addBtn = () => {
    if (!btnForm.label.trim()) return;
    const next = [...(s.receptionButtons || DEFAULT_BUTTONS), { id: uid(), ...btnForm }];
    set({ receptionButtons: next });
    setBtnForm({ label: "", sub: "", emoji: "🔔", color: BTN_COLORS[0].val, type: "custom" });
    setAddingBtn(false);
  };
  const removeBtn = (id) => set({ receptionButtons: (s.receptionButtons || DEFAULT_BUTTONS).filter(b => b.id !== id) });
  const moveBtn = (id, dir) => {
    const btns = [...(s.receptionButtons || DEFAULT_BUTTONS)];
    const i = btns.findIndex(b => b.id === id);
    const j = i + dir;
    if (j < 0 || j >= btns.length) return;
    [btns[i], btns[j]] = [btns[j], btns[i]];
    set({ receptionButtons: btns });
  };
  return (
    <div className="max-w-2xl">
      <h1 className="text-2xl font-bold text-slate-800 mb-6">設定</h1>
      <Card className="p-6 mb-5 space-y-4">
        <h2 className="font-bold text-slate-700">待ち受け画面テーマ</h2>
        <div className="grid grid-cols-5 gap-3">
          {THEME_ORDER.map(k => {
            const t = THEMES[k];
            const active = (s.bgTheme || "obsidian") === k;
            return (
              <button key={k} onClick={() => set({ bgTheme: k })}
                className={"rounded-xl overflow-hidden border-2 transition " + (active ? "border-slate-800 ring-2 ring-slate-400" : "border-slate-200 hover:border-slate-400")}>
                <div className="h-16 w-full" style={{ background: t.bg }} />
                <div className={"text-xs py-1.5 text-center font-medium " + (active ? "bg-slate-800 text-white" : "bg-slate-50 text-slate-600")}>
                  {t.label}
                </div>
              </button>
            );
          })}
        </div>
      </Card>
      <Card className="p-6 mb-5 space-y-4">
        <h2 className="font-bold text-slate-700">基本情報・待ち受け画面</h2>
        <Field label="会社名" value={s.companyName} onChange={(v) => set({ companyName: v })} />
        <Field label="タグライン（ロゴ下）" value={s.tagline} onChange={(v) => set({ tagline: v })} />
      </Card>
      <Card className="p-6 mb-5 space-y-4">
        <h2 className="font-bold text-slate-700">受付時間（曜日別）</h2>
        <div className="space-y-2">
          {bh.map((row, i) => (
            <div key={row.day} className={"flex items-center gap-3 px-3 py-2 rounded-lg " + (row.enabled ? "bg-slate-50" : "bg-slate-50 opacity-50")}>
              <label className="flex items-center gap-1.5 w-8 cursor-pointer shrink-0">
                <input type="checkbox" checked={row.enabled} onChange={e => setBH(i, { enabled: e.target.checked })} />
                <span className={"text-sm font-bold " + (row.enabled ? "text-slate-700" : "text-slate-400")}>{row.day}</span>
              </label>
              <input type="time" value={row.open} disabled={!row.enabled}
                onChange={e => setBH(i, { open: e.target.value })}
                className="text-sm px-2 py-1 rounded border border-slate-200 disabled:opacity-40 w-28" />
              <span className="text-slate-400 text-sm">〜</span>
              <input type="time" value={row.close} disabled={!row.enabled}
                onChange={e => setBH(i, { close: e.target.value })}
                className="text-sm px-2 py-1 rounded border border-slate-200 disabled:opacity-40 w-28" />
              {!row.enabled && <span className="text-xs text-slate-400 ml-1">定休日</span>}
            </div>
          ))}
        </div>
        <label className="flex items-center gap-3 cursor-pointer pt-1">
          <div className={"relative inline-block w-10 h-6 rounded-full transition " + (s.afterHoursReception ? "bg-sky-500" : "bg-slate-300")}
               onClick={() => set({ afterHoursReception: !s.afterHoursReception })}>
            <div className={"absolute top-1 w-4 h-4 rounded-full bg-white shadow transition-all " + (s.afterHoursReception ? "left-5" : "left-1")} />
          </div>
          <div>
            <div className="text-sm font-medium text-slate-800">時間外でも受付を許可する</div>
            <div className="text-xs text-slate-500">ONにすると時間外画面からもタップで受付を開始できます</div>
          </div>
        </label>
        <p className="text-xs text-slate-400">時間外・定休日は「ただいま営業時間外です」を表示します。</p>
      </Card>

      <Card className="p-6 mb-5 space-y-3">
        <h2 className="font-bold text-slate-700">受付ボタン管理</h2>
        <p className="text-xs text-slate-500">iPad受付のメニュー画面に表示するボタンを追加・編集・並び替えできます。</p>
        <div className="space-y-2">
          {(s.receptionButtons || DEFAULT_BUTTONS).map((btn, i) => (
            <div key={btn.id} className="flex items-center gap-3 px-3 py-2 rounded-xl border border-slate-200 bg-slate-50">
              <div className={"w-8 h-8 rounded-lg bg-gradient-to-br " + btn.color + " flex items-center justify-center text-lg shrink-0"}>
                {btn.emoji}
              </div>
              <div className="flex-1 min-w-0">
                <div className="text-sm font-medium text-slate-800">{btn.label}</div>
                <div className="text-xs text-slate-400 truncate">{btn.sub}</div>
              </div>
              <span className={"text-xs px-2 py-0.5 rounded-full " +
                (btn.type === "delivery" ? "bg-amber-100 text-amber-700" :
                 btn.type === "visitor" ? "bg-sky-100 text-sky-700" : "bg-slate-200 text-slate-600")}>
                {btn.type === "delivery" ? "配送" : btn.type === "visitor" ? "来訪" : "カスタム"}
              </span>
              <div className="flex gap-1 shrink-0">
                <button onClick={() => moveBtn(btn.id, -1)} disabled={i === 0}
                  className="w-6 h-6 rounded text-slate-400 hover:text-slate-700 disabled:opacity-20 text-xs">↑</button>
                <button onClick={() => moveBtn(btn.id, 1)} disabled={i === (s.receptionButtons||DEFAULT_BUTTONS).length - 1}
                  className="w-6 h-6 rounded text-slate-400 hover:text-slate-700 disabled:opacity-20 text-xs">↓</button>
                {btn.type === "custom" && (
                  <button onClick={() => removeBtn(btn.id)} className="w-6 h-6 rounded text-slate-300 hover:text-red-400 text-sm">×</button>
                )}
              </div>
            </div>
          ))}
        </div>
        {addingBtn ? (
          <div className="border border-slate-200 rounded-xl p-4 space-y-3 bg-sky-50">
            <div className="grid grid-cols-2 gap-3">
              <Field label="ボタン名 *" value={btnForm.label} onChange={v => setBtnForm(f => ({...f, label: v}))} />
              <Field label="サブテキスト" value={btnForm.sub} onChange={v => setBtnForm(f => ({...f, sub: v}))} />
            </div>
            <div className="grid grid-cols-2 gap-3">
              <Field label="絵文字" value={btnForm.emoji} onChange={v => setBtnForm(f => ({...f, emoji: v}))} />
              <div>
                <label className="text-slate-500 text-sm">カラー</label>
                <select value={btnForm.color} onChange={e => setBtnForm(f => ({...f, color: e.target.value}))}
                  className="w-full mt-1 px-3 py-2 rounded-lg border border-slate-200 text-sm outline-none focus:border-sky-400">
                  {BTN_COLORS.map(c => <option key={c.val} value={c.val}>{c.label}</option>)}
                </select>
              </div>
            </div>
            <div className="flex gap-2 pt-1">
              <button onClick={() => setAddingBtn(false)} className="px-4 py-2 rounded-lg border border-slate-200 text-sm text-slate-600">キャンセル</button>
              <button onClick={addBtn} disabled={!btnForm.label.trim()}
                className="flex-1 py-2 rounded-lg bg-slate-800 text-white text-sm disabled:opacity-40">追加する</button>
            </div>
          </div>
        ) : (
          <button onClick={() => setAddingBtn(true)}
            className="w-full py-2 rounded-lg border border-dashed border-slate-300 text-sm text-slate-500 hover:border-slate-400 hover:text-slate-700">
            ＋ ボタンを追加
          </button>
        )}
      </Card>
      <Card className="p-6 mb-5 space-y-3">
        <h2 className="font-bold text-slate-700">受付完了画面の表示（プライバシー）</h2>
        <div className="space-y-2">
          {[
            ["name", "氏名のみ表示", "「いらっしゃいませ ○○様」　※推奨"],
            ["full", "会社名＋氏名を表示", "「いらっしゃいませ XX株式会社 ○○様」"],
            ["generic", "汎用文のみ", "「ようこそお越しくださいました」（氏名を出さない）"],
          ].map(([val, label, desc]) => (
            <label key={val} className={"flex items-start gap-3 p-3 rounded-lg border cursor-pointer " +
              ((s.greetingMode || "name") === val ? "border-sky-400 bg-sky-50" : "border-slate-200")}>
              <input type="radio" name="greet" checked={(s.greetingMode || "name") === val}
                onChange={() => set({ greetingMode: val })} className="mt-1" />
              <div>
                <div className="text-sm font-medium text-slate-800">{label}</div>
                <div className="text-xs text-slate-500">{desc}</div>
              </div>
            </label>
          ))}
        </div>
        <p className="text-xs text-slate-400">
          受付端末は人目に触れる場所に置かれるため、会社名の表示は来訪事実が第三者に見える点に注意。既定は氏名のみ。
        </p>
      </Card>
      <Card className="p-6 mb-5 space-y-3">
        <h2 className="font-bold text-slate-700">Googleカレンダー連携</h2>
        <div className="flex items-start gap-3 p-3 rounded-lg bg-blue-50 border border-blue-200">
          <span className="text-2xl">📅</span>
          <div>
            <div className="text-sm font-medium text-slate-800">ブラウザ拡張機能方式（推奨）</div>
            <div className="text-xs text-slate-600 mt-1 leading-relaxed">
              Google Calendarの予定作成画面に拡張機能を追加する方式。
              カレンダーに直接QR発行ボタンが表示され、担当者が自分で招待を発行できます。
              APIの管理者権限設定が不要で軽量です。
            </div>
            <a href="#" className="text-xs text-blue-600 mt-1 inline-block">拡張機能のインストール方法 →</a>
          </div>
        </div>
        <div className="flex items-start gap-3 p-3 rounded-lg bg-slate-50 border border-slate-200 opacity-60">
          <span className="text-2xl">🔗</span>
          <div>
            <div className="text-sm font-medium text-slate-700">Google Calendar API方式（フェーズ2）</div>
            <div className="text-xs text-slate-500 mt-1">管理画面から招待作成時に自動でカレンダー登録・会議室予約。サービスアカウント設定が必要。</div>
          </div>
        </div>
      </Card>
      <Card className="p-6 mb-5 space-y-4">
        <h2 className="font-bold text-slate-700">Google Chat 通知</h2>
        <Field label="Incoming Webhook URL" value={s.chatWebhook} onChange={(v) => set({ chatWebhook: v })} />
        <p className="text-xs text-slate-400">受付・退館時にこのWebhookへ通知を送信します。</p>
      </Card>
      <Card className="p-6 space-y-3">
        <h2 className="font-bold text-slate-700">会議室</h2>
        <div className="flex flex-wrap gap-2">
          {s.rooms.map((r) => (
            <span key={r} className="px-3 py-1 rounded-full bg-slate-100 text-slate-700 text-sm flex items-center gap-2">
              {r}
              <button onClick={() => set({ rooms: s.rooms.filter((x) => x !== r) })} className="text-slate-400 hover:text-red-500">×</button>
            </span>
          ))}
        </div>
        <div className="flex gap-2">
          <input value={roomInput} onChange={(e) => setRoomInput(e.target.value)} placeholder="会議室名を追加"
            className="flex-1 px-3 py-2 rounded-lg border border-slate-200 outline-none focus:border-sky-400 text-sm" />
          <button onClick={() => { if (roomInput.trim()) { set({ rooms: [...s.rooms, roomInput.trim()] }); setRoomInput(""); } }}
            className="px-4 py-2 rounded-lg bg-slate-800 text-white text-sm">追加</button>
        </div>
      </Card>
    </div>
  );
}

/* ============================ ルート ============================ */
function App() {
  const [db, setDBState] = useState(loadDB());
  const [view, setView] = useState("kiosk"); // kiosk | admin
  const [toast, setToast] = useState(null);
  const [forceClosed, setForceClosed] = useState(false);

  const setDB = (next) => { setDBState(next); saveDB(next); };
  const notify = (msg) => { setToast(msg); setTimeout(() => setToast(null), 4000); };
  const reset = () => { localStorage.removeItem(DB_KEY); const d = loadDB(); setDBState(d); };

  return (
    <div className="min-h-screen flex flex-col">
      {/* デモ用ツールバー */}
      <div className="bg-slate-950 text-white px-5 py-3 flex items-center gap-4 flex-wrap">
        <span className="font-bold text-sky-400">受付システム ホットモック</span>
        <div className="flex rounded-lg overflow-hidden border border-white/20">
          <button onClick={() => setView("kiosk")}
            className={"px-4 py-1.5 text-sm " + (view === "kiosk" ? "bg-sky-500" : "bg-transparent")}>📱 受付端末</button>
          <button onClick={() => setView("admin")}
            className={"px-4 py-1.5 text-sm " + (view === "admin" ? "bg-sky-500" : "bg-transparent")}>🖥 管理画面</button>
        </div>
        {view === "kiosk" && (
          <label className="flex items-center gap-2 text-sm text-slate-300">
            <input type="checkbox" checked={forceClosed} onChange={(e) => setForceClosed(e.target.checked)} />
            営業時間外をシミュレート
          </label>
        )}
        <button onClick={reset} className="ml-auto text-xs px-3 py-1.5 rounded-lg bg-white/10 hover:bg-white/20">
          🔄 デモデータをリセット
        </button>
      </div>

      {/* 本体 */}
      <div className="flex-1 flex items-center justify-center p-6">
        {view === "kiosk" ? (
          <div className="ipad-frame bg-black p-3 w-[900px] max-w-full">
            <div className="rounded-[26px] overflow-hidden h-[640px] relative">
              <Kiosk db={db} setDB={setDB} notify={notify} forceClosed={forceClosed} />
            </div>
          </div>
        ) : (
          <div className="w-full max-w-6xl h-[680px] rounded-2xl overflow-hidden shadow-2xl border border-slate-700">
            <Admin db={db} setDB={setDB} notify={notify} />
          </div>
        )}
      </div>

      <ChatToast toast={toast} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>

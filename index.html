/* ---- Supabase ↔ アプリ 型変換 ---- */
const COLOR_TO_GRADIENT = {
  blue:   "from-sky-400 to-indigo-500",
  orange: "from-amber-400 to-orange-500",
  green:  "from-emerald-400 to-teal-500",
  violet: "from-violet-400 to-purple-500",
  red:    "from-rose-400 to-red-500",
  slate:  "from-slate-500 to-slate-700",
};
const GRADIENT_TO_COLOR = Object.fromEntries(
  Object.entries(COLOR_TO_GRADIENT).map(([k, v]) => [v, k])
);

function normalizeBH(raw) {
  // Supabaseのシード形式 {day:0, label:"月", open:true, start:"09:00", end:"18:00"}
  // アプリ形式 {day:"月", enabled:true, open:"09:00", close:"18:00"}
  if (!Array.isArray(raw)) return DEFAULT_BUSINESS_HOURS;
  if (raw[0] && typeof raw[0].enabled !== "undefined") return raw; // already app format
  return raw.map(r => ({
    day:     r.label || String(r.day),
    enabled: r.open !== false,
    open:    r.start || "09:00",
    close:   r.end   || "18:00",
  }));
}

/* ---- Supabase からロード ---- */
async function loadFromSupabase() {
  const todayStr = new Date().toISOString().slice(0, 10);
  const [setRes, roomRes, btnRes, invRes, visitRes, availRes] = await Promise.all([
    sb.from("reception_settings").select("key,value"),
    sb.from("reception_rooms").select("*").eq("is_active", true).order("sort_order"),
    sb.from("reception_buttons").select("*").eq("is_active", true).order("sort_order"),
    sb.from("reception_invitations").select("*").order("visit_date", { ascending: true }),
    sb.from("reception_visits").select("*").order("checked_in_at", { ascending: false }).limit(300),
    sb.from("reception_room_availability").select("*").eq("date", todayStr),
  ]);

  const kv = {};
  (setRes.data || []).forEach(r => { kv[r.key] = r.value; });

  // ---- クラウド設定を module 変数へ反映（端末をまたいで共有） ----
  const _strVal = (v) => typeof v === "string" ? v.replace(/^"|"$/g, "") : (v != null ? String(v) : "");
  const apiKeyCloud = _strVal(kv["anthropic_api_key"]);
  if (apiKeyCloud) { _cloudApiKey = apiKeyCloud; localStorage.setItem(API_KEY_STORAGE, apiKeyCloud); }
  else if (!apiKeyCloud && localStorage.getItem(API_KEY_STORAGE)) {
    // ローカルにあってクラウドにない → 自動アップロード（マイグレーション）
    const localKey = localStorage.getItem(API_KEY_STORAGE);
    _cloudApiKey = localKey;
    sb.from("reception_settings").upsert({ key: "anthropic_api_key", value: localKey }, { onConflict: "key" }).then(() => {});
  }
  const chimeCloud = _strVal(kv["chime_preset"]);
  if (chimeCloud) { _cloudChimePreset = chimeCloud; localStorage.setItem(CHIME_PRESET_KEY, chimeCloud); }
  else if (!chimeCloud && localStorage.getItem(CHIME_PRESET_KEY)) {
    const localChime = localStorage.getItem(CHIME_PRESET_KEY);
    _cloudChimePreset = localChime;
    sb.from("reception_settings").upsert({ key: "chime_preset", value: localChime }, { onConflict: "key" }).then(() => {});
  }
  const pinCloud = _strVal(kv["admin_pin"]);
  if (pinCloud) { _cloudPin = pinCloud; localStorage.setItem("admin_pin", pinCloud); }
  else if (!pinCloud && localStorage.getItem("admin_pin")) {
    const localPin = localStorage.getItem("admin_pin");
    _cloudPin = localPin;
    sb.from("reception_settings").upsert({ key: "admin_pin", value: localPin }, { onConflict: "key" }).then(() => {});
  }

  const roomList = roomRes.data || [];
  const rooms = roomList.map(r => r.name);

  // calendar_id → events のマップを作り、room名でも引けるようにする
  const availByCalId = {};
  (availRes.data || []).forEach(a => { availByCalId[a.calendar_id] = a.events || []; });
  const roomAvailability = {};  // { "会議室名": [{title,start,end}, ...] }
  let availSyncedAt = null;
  roomList.forEach(r => {
    if (r.calendar_id && availByCalId[r.calendar_id]) {
      roomAvailability[r.name] = availByCalId[r.calendar_id];
    }
  });
  const availRows = availRes.data || [];
  if (availRows.length) {
    availSyncedAt = availRows.reduce((latest, a) =>
      !latest || a.synced_at > latest ? a.synced_at : latest, null);
  }

  const receptionButtons = (btnRes.data || []).map(b => ({
    id:    b.id,
    label: b.label,
    emoji: b.emoji || "",
    color: COLOR_TO_GRADIENT[b.color] || BTN_COLORS[0].val,
    type:  b.type,
    sub:   b.type === "delivery" ? "ボタンひとつで担当者を呼び出します" : "QRコード または お名前で受付",
  }));

  const invitations = (invRes.data || []).map(i => ({
    id:          i.id,
    code:        i.qr_token,
    visitorName: i.visitor_name,
    company:     i.company_name || "",
    host:        i.host_name,
    date:        i.visit_date,
    time:        i.visit_time ? i.visit_time.slice(0, 5) : "",
    room:        "",
    emailSent:   i.send_method === "email",
    used:        i.status === "arrived",
    status:      i.status,
  }));

  const logs = (visitRes.data || []).map(v => ({
    id:      v.id,
    name:    v.visitor_name,
    company: v.company_name || "",
    type:    v.visit_type,
    host:    v.host_name || "",
    action:  v.checked_out_at ? "退館" : "入館",
    ts:      v.checked_in_at,
  }));

  return {
    settings: {
      companyName:       kv["company_name"] || "株式会社ユリーカ",
      companyLogo:       (typeof kv["company_logo"] === "string" ? kv["company_logo"].replace(/^"|"$/g,"") : null) || null,
      tagline:           "SIMPLEVOLUTION.",
      businessHours:     normalizeBH(kv["business_hours"]),
      receptionButtons:  receptionButtons.length ? receptionButtons : DEFAULT_BUTTONS,
      greetingMode:      "name",
      bgTheme:           kv["theme"] || "midnight",
      afterHoursReception: kv["allow_outside_hours"] === true || kv["allow_outside_hours"] === "true",
      chatWebhook:       kv["google_chat_webhook"] || "",
      rooms:             rooms.length ? rooms : ["会議室A", "会議室B", "応接室"],
      visitorMethods:    (() => { try { const v = kv["visitor_methods"]; if (!v) return DEFAULT_VISITOR_METHODS; return Array.isArray(v) ? v : JSON.parse(String(v).replace(/^"|"$/g,"")); } catch { return DEFAULT_VISITOR_METHODS; } })(),
    },
    invitations,
    logs,
    roomAvailability,   // { "部屋名": [{title,start,end},...] }
    availSyncedAt,      // 最終同期日時
  };
}

/* ---- Supabase への差分同期 ---- */
async function syncToSupabase(next, prev) {
  if (!prev) return;

  // 新規来訪ログ（UUID を明示的に渡すことで Chat カードと紐付く）
  const newLogs = next.logs.filter(l => !prev.logs.find(p => p.id === l.id));
  for (const log of newLogs) {
    await sb.from("reception_visits").insert({
      id:            log.id,
      visitor_name:  log.name,
      company_name:  log.company || null,
      visit_type:    log.type || "walkin",
      host_name:     log.host || null,
      person_count:  log.count || 1,
      visit_purpose: log.purpose || null,
      checked_in_at: log.ts || new Date().toISOString(),
    });
  }

  // 新規招待
  const newInvs = next.invitations.filter(i => !prev.invitations.find(p => p.id === i.id));
  for (const inv of newInvs) {
    const { data } = await sb.from("reception_invitations").insert({
      visitor_name: inv.visitorName,
      company_name: inv.company || null,
      host_name:    inv.host,
      visit_date:   inv.date,
      visit_time:   inv.time || null,
      send_method:  inv.emailSent ? "email" : "unsent",
    }).select("id,qr_token").single();
    // DBが採番したIDで上書き
    if (data) {
      inv.id   = data.id;
      inv.code = data.qr_token;
    }
  }

  // 招待ステータス変更（QRスキャンで used=true）
  const updInvs = next.invitations.filter(i => {
    const p = prev.invitations.find(p => p.id === i.id);
    return p && p.used !== i.used;
  });
  for (const inv of updInvs) {
    await sb.from("reception_invitations").update({
      status:     inv.used ? "arrived" : "pending",
      arrived_at: inv.used ? new Date().toISOString() : null,
    }).eq("id", inv.id);
  }

  // 設定変更
  if (JSON.stringify(next.settings) !== JSON.stringify(prev.settings)) {
    const s = next.settings;
    const rows = [
      { key: "company_name",         value: s.companyName },
      { key: "theme",                value: s.bgTheme },
      { key: "allow_outside_hours",  value: s.afterHoursReception },
      { key: "business_hours",       value: s.businessHours },
      { key: "google_chat_webhook",  value: s.chatWebhook || null },
      { key: "visitor_methods",      value: s.visitorMethods || DEFAULT_VISITOR_METHODS },
    ];
    for (const row of rows) {
      await sb.from("reception_settings").upsert(row, { onConflict: "key" });
    }
  }
}

/* ============================ カメラコンポーネント ============================ */
function QRCamera({ onDetect }) {
  const videoRef = useRef(null);
  const [camErr, setCamErr] = useState(null);

  useEffect(() => {
    let stream = null;
    let animId = null;
    let active = true;

    (async () => {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 } }
        });
        if (!active) { stream.getTracks().forEach(t => t.stop()); return; }
        const video = videoRef.current;
        if (!video) return;
        video.srcObject = stream;
        await video.play();
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        const tick = () => {
          if (!active) return;
          if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
            if (window.jsQR) {
              const code = window.jsQR(img.data, img.width, img.height, { inversionAttempts: "dontInvert" });
              if (code?.data) {
                active = false;
                stream.getTracks().forEach(t => t.stop());
                onDetect(code.data);
                return;
              }
            }
          }
          animId = requestAnimationFrame(tick);
        };
        animId = requestAnimationFrame(tick);
      } catch (e) { if (active) setCamErr(e.message); }
    })();

    return () => {
      active = false;
      if (animId) cancelAnimationFrame(animId);
      if (stream) stream.getTracks().forEach(t => t.stop());
    };
  }, []);

  if (camErr) return (
    <div className="flex flex-col items-center gap-2 py-6 text-center">
      <span className="text-4xl">📵</span>
      <p className="text-slate-500 text-sm">カメラを起動できませんでした</p>
      <p className="text-slate-400 text-xs">{camErr}</p>
    </div>
  );

  return (
    <div className="relative w-full rounded-xl overflow-hidden bg-black" style={{ aspectRatio: "4/3" }}>
      <video ref={videoRef} className="w-full h-full object-cover" playsInline muted />
      <div className="absolute inset-0 pointer-events-none flex items-center justify-center">
        <div className="w-52 h-52 rounded-2xl"
          style={{ border: "2px solid rgba(56,189,248,.9)", boxShadow: "0 0 0 9999px rgba(0,0,0,.45)" }} />
      </div>
      <p className="absolute bottom-3 left-0 right-0 text-center text-white/80 text-sm pointer-events-none">
        QRコードを枠内にかざしてください
      </p>
    </div>
  );
}

  const [ready, setReady] = useState(false);

  useEffect(() => {

    (async () => {
      try {
        const s = await navigator.mediaDevices.getUserMedia({

        });

function _audioCtx() {
  return new (window.AudioContext || window.webkitAudioContext)();
}

function _bellNote(ctx, freq, startSec, vol = 0.45, decay = 1.4) {
  const osc = ctx.createOscillator(), gain = ctx.createGain();
  const osc2 = ctx.createOscillator(), gain2 = ctx.createGain();
  osc.type = osc2.type = "sine";
  osc.frequency.value = freq;
  osc2.frequency.value = freq * 2.756;
  const t = ctx.currentTime + startSec;
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(vol, t + 0.008);
  gain.gain.exponentialRampToValueAtTime(0.001, t + decay);
  gain2.gain.setValueAtTime(0, t);
  gain2.gain.linearRampToValueAtTime(vol * 0.27, t + 0.008);
  gain2.gain.exponentialRampToValueAtTime(0.001, t + decay * 0.35);
  osc.connect(gain);   gain.connect(ctx.destination);
  osc2.connect(gain2); gain2.connect(ctx.destination);
  osc.start(t);  osc.stop(t + decay + 0.1);
  osc2.start(t); osc2.stop(t + decay + 0.1);
}

// C: ソフトチャイム（ド→ミ→ソ）
function _playSoft() {
  const ctx = _audioCtx();
  [{ f: 523.25, s: 0.0 }, { f: 659.25, s: 0.28 }, { f: 783.99, s: 0.56 }]
    .forEach(({ f, s }) => _bellNote(ctx, f, s));
}

// A: ピンポーン（ドアベル）
function _playDoorbell() {
  const ctx = _audioCtx();
  [{ f: 440, s: 0.0 }, { f: 350, s: 0.45 }]
    .forEach(({ f, s }) => _bellNote(ctx, f, s, 0.5, 0.9));
}

// B: チン（ホテルベル）
function _playBell() {
  const ctx = _audioCtx();
  _bellNote(ctx, 880, 0, 0.55, 2.2);
}

// D: 明るいチャイム（ド→ミ→ソ→ド高）
function _playBright() {
  const ctx = _audioCtx();
  [{ f: 523.25, s: 0.0 }, { f: 659.25, s: 0.22 }, { f: 783.99, s: 0.44 }, { f: 1046.50, s: 0.66 }]
    .forEach(({ f, s }) => _bellNote(ctx, f, s, 0.38, 1.0));
}

// E: 木琴風（マリンバ）
function _playMarimba() {
  const ctx = _audioCtx();
  [{ f: 783.99, s: 0.0 }, { f: 1046.50, s: 0.22 }].forEach(({ f, s }) => {
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.type = "sine"; osc.frequency.value = f;
    const t = ctx.currentTime + s;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.5, t + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.5);
    // 倍音（木っぽさ）
    const osc2 = ctx.createOscillator(), gain2 = ctx.createGain();
    osc2.type = "sine"; osc2.frequency.value = f * 3.97;
    gain2.gain.setValueAtTime(0, t);
    gain2.gain.linearRampToValueAtTime(0.1, t + 0.003);
    gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    osc2.connect(gain2); gain2.connect(ctx.destination);
    osc2.start(t); osc2.stop(t + 0.2);
  });
}

  const addLog = (entry) => {
    const visitId = crypto.randomUUID();
    const next = { ...db, logs: [{ id: visitId, ts: nowISO(), action: "入館", ...entry }, ...db.logs] };
    setDB(next);
    return visitId;
  };

  // chatCardInfo があれば Google Chat にも通知
  const goDone = (msg, chatMsg, chatCardInfo) => {
    playChime();
    setDoneMsg(msg);
    setScreen("done");
    notify(chatMsg);
    if (chatCardInfo) sendChatCard(chatCardInfo); // 非同期・失敗しても続行
    setTimeout(() => setScreen("standby"), 4500);
  };

  const handleDelivery = () => {
    const time = fmtTime(nowISO());
    const visitId = addLog({ name: "配送業者", company: "", type: "delivery", host: "" });
    goDone(
      "受付ありがとうございます。\n担当者がまいりますので少々お待ちください。",
      "📦 配送業者が受付に到着しました\n受付時刻: " + time,
      { visitId, visitorName: "配送業者", company: "", host: "", room: "", time, isDelivery: true }
    );
  };

  const handleQRScan = (inv) => {
    setPickerOpen(false);
    setQrSelectedInv(null);
    const visitId = crypto.randomUUID();
    const time = fmtTime(nowISO());
    const next = {
      ...db,
      invitations: db.invitations.map((i) => i.id === inv.id ? { ...i, used: true } : i),
      logs: [{ id: visitId, ts: nowISO(), action: "入館", name: inv.visitorName, company: inv.company,
               type: "visitor", host: inv.host, count: countInput, purpose: purposeInput }, ...db.logs],
    };
    setDB(next);
    goDone(
      welcomeMsg(inv.company, inv.visitorName),
      "🙋 来訪者が受付に到着しました\n氏名: " + inv.visitorName + "（" + inv.company + "）\n担当: " +
      inv.host + " さん\n会議室: " + (inv.room || "未設定") + "\n受付時刻: " + time,
      { visitId, visitorName: inv.visitorName, company: inv.company, host: inv.host, room: inv.room || "", time,
        count: countInput, purpose: purposeInput }
    );
    setCountInput(1); setPurposeInput("");
  };

  const handleKeyboard = () => {
    if (!nameInput.trim()) return;
    const time = fmtTime(nowISO());
    const visitId = addLog({ name: nameInput.trim(), company: companyInput.trim(), type: "visitor", host: "（受付入力）", count: countInput, purpose: purposeInput });
    goDone(
      nameInput.trim() + " 様、ようこそお越しくださいました。\n担当者へお取り次ぎいたします。",
      "🙋 来訪者が受付に到着しました（キーボード入力）\n氏名: " + nameInput.trim() +
      (companyInput.trim() ? "（" + companyInput.trim() + "）" : "") + "\n受付時刻: " + time,
      { visitId, visitorName: nameInput.trim(), company: companyInput.trim(), host: "（受付入力）", room: "", time,
        count: countInput, purpose: purposeInput }
    );
    setNameInput(""); setCompanyInput(""); setCountInput(1); setPurposeInput("");
  };

  // 名刺撮影 → OCR（デモ：読み取り結果をシミュレート）
  const sampleCards = [
    { name: "田中 大輔", company: "株式会社グローバルテック" },
    { name: "高橋 美咲", company: "みらい設計事務所" },
    { name: "渡辺 隆", company: "株式会社ニッポン物産" },
  ];
  const captureCard = () => {
    setCardStep("scanning");
    const pick = sampleCards[clock.getSeconds() % sampleCards.length];
    setTimeout(() => {
      setCardName(pick.name);
      setCardCompany(pick.company);
      setCardStep("review");
    }, 1600);
  };
  const handleCard = () => {
    if (!cardName.trim()) return;
    const time = fmtTime(nowISO());
    const visitId = addLog({ name: cardName.trim(), company: cardCompany.trim(), type: "visitor", host: "（名刺受付）", count: countInput, purpose: purposeInput });
    goDone(
      welcomeMsg(cardCompany.trim(), cardName.trim()),
      "🙋 来訪者が受付に到着しました（名刺受付）\n氏名: " + cardName.trim() +
      (cardCompany.trim() ? "（" + cardCompany.trim() + "）" : "") + "\n受付時刻: " + time,
      { visitId, visitorName: cardName.trim(), company: cardCompany.trim(), host: "（名刺受付）", room: "", time,
        count: countInput, purpose: purposeInput }
    );
    setCardName(""); setCardCompany(""); setCountInput(1); setPurposeInput("");
  };

  // 音声受付
  const startVoice = () => {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      setVoiceError("お使いのブラウザは音声認識に対応していません。Chrome または Safari をお使いください。");
      setVoiceStep("error"); return;
    }
    const apiKey = getApiKey();
    if (!apiKey) {
      setVoiceError("管理画面の設定にAnthropicのAPIキーを入力してください。");
      setVoiceStep("error"); return;
    }
    // TTS は認識開始時に使わない（マイクと競合するため）
    setVoiceStep("listening");
    setVoiceTranscript("");
    setVoiceError("");
    const recog = new SpeechRecognition();
    recog.lang = "ja-JP";
    recog.continuous = true;   // 自動停止させず「完了」ボタンで止める
    recog.interimResults = true;
    recog.maxAlternatives = 1;
    voiceRecogRef.current = recog;
    recog.onresult = (e) => {
      const t = Array.from(e.results).map(r => r[0].transcript).join("");
      setVoiceTranscript(t);
    };
    recog.onerror = (e) => {
      if (e.error === "no-speech") {
        setVoiceError("音声が聞き取れませんでした。マイクに近づいてもう一度お話しください。");
      } else if (e.error === "not-allowed") {
        setVoiceError("マイクの使用が許可されていません。ブラウザの設定でマイクを許可してください。");
      } else {
        setVoiceError("音声認識エラー: " + e.error);
      }
      setVoiceStep("error");
    };
    recog.start();
  };
  const voiceTranscriptRef = useRef("");
  const voiceRecogRef = useRef(null);
  useEffect(() => { voiceTranscriptRef.current = voiceTranscript; }, [voiceTranscript]);

  const stopVoiceAndProcess = async () => {
    if (voiceRecogRef.current) { voiceRecogRef.current.stop(); voiceRecogRef.current = null; }
    const transcript = voiceTranscriptRef.current;
    if (!transcript.trim()) {
      setVoiceError("音声が認識できませんでした。もう一度お試しください。");
      setVoiceStep("error"); return;
    }
    setVoiceStep("processing");
    try {
      const prompt = `受付での来訪者の発言から、氏名・会社名・社内担当者名を抽出してください。
不明な場合は空文字にしてください。JSON形式のみ返してください。

発言:「${transcript}」

{"visitorName":"","company":"","host":""}`;
      const raw = await callClaude(getApiKey(), prompt);
      const json = JSON.parse(raw.match(/\{[\s\S]*\}/)[0]);
      setVoiceResult(json);
      setVoiceStep("confirm");
      speak((json.visitorName || "お客様") + "様、いらっしゃいませ。内容をご確認ください。");
    } catch(e) {
      setVoiceError("解析に失敗しました: " + e.message);
      setVoiceStep("error");
    }
  };

  const handleVoiceConfirm = () => {
    if (!voiceResult.visitorName) return;
    const time = fmtTime(nowISO());
    const visitId = addLog({ name: voiceResult.visitorName, company: voiceResult.company,
                             type: "voice", host: voiceResult.host || "（音声受付）", count: countInput, purpose: purposeInput });
    goDone(
      welcomeMsg(voiceResult.company, voiceResult.visitorName),
      "🎤 来訪者が音声で受付しました\n氏名: " + voiceResult.visitorName +
      (voiceResult.company ? "（" + voiceResult.company + "）" : "") +
      "\n受付時刻: " + time,
      { visitId, visitorName: voiceResult.visitorName, company: voiceResult.company,
        host: voiceResult.host || "（音声受付）", room: "", time, count: countInput, purpose: purposeInput }
    );
    setVoiceStep("idle"); setCountInput(1); setPurposeInput("");
  };

  // 受付完了時のあいさつ文（プライバシー設定を反映）
  const welcomeMsg = (company, name) => {
    const mode = db.settings.greetingMode || "name";
    if (mode === "generic") return "ようこそお越しくださいました。\n担当者へお取り次ぎいたします。";
    if (mode === "full" && company)
      return "いらっしゃいませ\n" + company + "\n" + name + " 様\n\n担当者がまいります。少々お待ちください。";
    return "いらっしゃいませ\n" + name + " 様\n\n担当者がまいります。少々お待ちください。";
  };

  /* ---- 営業時間外 ---- */
  if (!isOpen() && screen === "standby") {
    const allowAfter = db.settings.afterHoursReception;
    return (
      <KioskShell bg={THEMES[db.settings.bgTheme || "obsidian"].bg} onClick={allowAfter ? () => setScreen("menu") : undefined}>
        <div className="flex-1 flex flex-col items-center justify-center text-center text-white px-10">
          <div className="text-5xl mb-6">🌙</div>
          <div className="text-3xl font-bold mb-3">ただいま営業時間外です</div>
          <div className="text-slate-300 text-lg">
            受付時間 {db.settings.openTime} 〜 {db.settings.closeTime}
          </div>
          <div className="text-slate-400 text-sm mt-2">
            {(() => { const t = todayBH(); return t.enabled ? `受付時間 ${t.open} 〜 ${t.close}` : "本日は定休日です"; })()}
          </div>
          {allowAfter && (
            <div className="mt-8 px-6 py-3 rounded-full bg-white/10 border border-white/20 text-sm cursor-pointer">
              画面をタップして受付を開始
            </div>
          )}
          <div className="mt-6 text-slate-400 text-xs">{db.settings.companyName}</div>
        </div>
      </KioskShell>
    );
  }

  /* ---- 待ち受け ---- */
  if (screen === "standby") {
    const th = THEMES[db.settings.bgTheme || "obsidian"];
    return (
      <KioskShell bg={th.bg}>
        <StandbyDecor theme={th} />
        <div className="relative z-10 flex-1 flex flex-col md:flex-row items-center justify-center cursor-pointer select-none" onClick={() => setScreen("menu")}>
          {/* 上/左カラム: あいさつ + ロゴ */}
          <div className="flex-1 flex flex-col items-center justify-center text-center px-8 py-4">
            <div className={"fadeup flex items-center gap-3 mb-0.5"}>
              <span className={"h-px w-6 " + th.lineColor} />
              <span className={th.greetEn}>{greeting().en}</span>
              <span className={"h-px w-6 " + th.lineColor} />
            </div>
            <div className={"fadeup mb-6 " + th.greetJp}>{greeting().jp}</div>
            <div className="fadeup-2 floaty rounded-3xl px-8 py-6"
                 style={{ background: th.logoCard.bg, boxShadow: th.logoCard.shadow }}>
              <Logo width={280} customSrc={db.settings.companyLogo} />
            </div>
            <div className={"fadeup-4 text-xs mt-5 " + th.footer}>RECEPTION · ユリーカ</div>
          </div>

          {/* 下/右カラム: 時計 + ボタン */}
          <div className="flex-1 flex flex-col items-center justify-center text-center px-8 py-4">
            <div className="fadeup-3 flex items-end gap-1 tabular-nums leading-none">
              <span className={"text-7xl tracking-tight " + th.clock}>
                {clock.toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" })}
              </span>
              <span className={"text-xl mb-2 w-8 text-left font-light " + th.clockSub}>
                {String(clock.getSeconds()).padStart(2, "0")}
              </span>
            </div>
            <div className={"fadeup-3 mt-2 " + th.date}>
              {clock.toLocaleDateString("ja-JP", { year: "numeric", month: "long", day: "numeric", weekday: "long" })}
            </div>
            <div className="fadeup-4 mt-8 px-8 py-4 rounded-full text-base font-medium flex items-center gap-3 cursor-pointer"
                 style={{ background: `linear-gradient(to right, ${th.btn.from}, ${th.btn.to})`,
                          boxShadow: `0 0 0 0 ${th.btn.glow}, 0 8px 30px rgba(0,0,0,.4)`,
                          animation: `glowpulse 2.6s ease-in-out infinite` }}>
              <span>👆</span>
              <span className={th.btn.shine}>画面をタップして受付を開始</span>
            </div>
            {getApiKey() ? (
              <>
                <div className="fadeup-4 flex items-center gap-3 mt-5 w-72">
                  <span className="flex-1 h-px bg-white/15" />
                  <span className="text-white/30 text-xs tracking-widest">または</span>
                  <span className="flex-1 h-px bg-white/15" />
                </div>
                <button onClick={e => { e.stopPropagation(); setVoiceStep("idle"); setScreen("voice"); }}
                  className="fadeup-4 voice-btn mt-3 group relative overflow-hidden rounded-2xl px-7 py-4 active:scale-95 transition-transform"
                  style={{ background: "linear-gradient(135deg, #1e1b4b 0%, #312e81 45%, #4c1d95 100%)" }}>
                  {/* shimmer overlay */}
                  <div className="absolute inset-0 pointer-events-none"
                    style={{ background: "linear-gradient(105deg, transparent 30%, rgba(255,255,255,.07) 50%, transparent 70%)", backgroundSize: "200% 100%", animation: "voiceshine 3s linear infinite" }} />
                  <div className="relative flex items-center gap-4">
                    {/* 3重リング＋マイクアイコン */}
                    <div className="relative w-12 h-12 flex items-center justify-center shrink-0">
                      <span className="absolute inset-0 rounded-full bg-violet-400/20 animate-ping" style={{ animationDuration: "2.4s" }} />
                      <span className="absolute inset-1.5 rounded-full bg-violet-400/20 animate-ping" style={{ animationDuration: "2.4s", animationDelay: ".5s" }} />
                      <span className="absolute inset-3 rounded-full bg-violet-300/30 animate-ping" style={{ animationDuration: "2.4s", animationDelay: "1s" }} />
                      <span className="relative text-2xl">🎤</span>
                    </div>
                    <div className="text-left">
                      <div className="flex items-center gap-2 mb-0.5">
                        <span className="voice-shine text-xl font-black tracking-wide">AI 音声受付</span>
                        <span className="text-xs px-2 py-0.5 rounded-full font-bold text-white"
                          style={{ background: "linear-gradient(to right, #a855f7, #ec4899)" }}>Claude</span>
                      </div>
                      <div className="text-xs text-violet-300 font-medium tracking-wide">✨ お名前を話すだけで受付完了</div>
                    </div>
                  </div>
                </button>
              </>
            ) : null}
          </div>
        </div>
      </KioskShell>
    );
  }

  /* ---- メニュー ---- */
  if (screen === "menu") {
    const btns = (db.settings.receptionButtons || DEFAULT_BUTTONS);
    const cols = btns.length <= 2 ? "grid-cols-2" : btns.length === 3 ? "grid-cols-3" : "grid-cols-2";
    return (
      <KioskShell>
        <Header title="ご用件をお選びください" onBack={() => setScreen("standby")} />
        <div className="flex-1 grid gap-5 p-8" style={{ alignContent: "start" }}>
          <div className={"grid " + cols + " gap-5"}>
            {btns.map(btn => (
              <BigButton key={btn.id} emoji={btn.emoji} label={btn.label} sub={btn.sub} color={btn.color}
                onClick={() => {
                  if (btn.type === "delivery") handleDelivery();
                  else if (btn.type === "visitor") setScreen("visitor");
                  else {
                    addLog({ name: "（その他）", company: "", type: "custom", host: btn.label });
                    goDone("担当者へご連絡いたします。\n少々お待ちください。",
                      "🔔 " + btn.label + "\n受付時刻: " + fmtTime(nowISO()));
                  }
                }} />
            ))}
          </div>
        </div>
      </KioskShell>
    );
  }

  /* ---- 来訪者: QR / キーボード 選択 ---- */
  if (screen === "visitor") {
    // 設定で有効にされた受付方法（音声はAPIキー必須）
    const enabledIds = db.settings.visitorMethods || DEFAULT_VISITOR_METHODS;
    const showQr       = enabledIds.includes("qr");
    const showCard     = enabledIds.includes("card");
    const showKeyboard = enabledIds.includes("keyboard");
    const voiceEnabled = enabledIds.includes("voice") && !!getApiKey();
    const regularCount = [showQr, showCard, showKeyboard].filter(Boolean).length;
    const cols = regularCount <= 1 ? "grid-cols-1" :
                 regularCount === 2 ? "grid-cols-2" : "grid-cols-3";
    return (
      <KioskShell>
        <Header title="受付方法をお選びください" onBack={() => setScreen("menu")} />
        <div className="flex-1 flex flex-col">
          <div className={"grid " + cols + " gap-4 p-8 " + (voiceEnabled ? "pb-4" : "")}>
            {showQr       && <BigButton emoji="📷" label="QRコードをかざす"  sub="招待メールのQRを読み取ります"    color="from-emerald-400 to-teal-500"    onClick={() => setPickerOpen(true)} />}
            {showCard     && <BigButton emoji="💳" label="名刺を撮影"        sub="名刺をかざすと自動で読み取ります" color="from-sky-400 to-blue-500"        onClick={() => { setCardStep("camera"); setScreen("card"); }} />}
            {showKeyboard && <BigButton emoji="⌨️" label="お名前を入力"      sub="キーボードで受付します"           color="from-violet-400 to-purple-500"   onClick={() => setScreen("keyboard")} />}
          </div>
          {voiceEnabled && (
            <div className="px-8 pb-8">
              <button onClick={() => { setVoiceStep("idle"); setScreen("voice"); }}
                className="voice-btn w-full group relative overflow-hidden rounded-2xl px-6 py-5 active:scale-95 transition-transform"
                style={{ background: "linear-gradient(135deg, #1e1b4b 0%, #312e81 45%, #4c1d95 100%)" }}>
                <div className="absolute inset-0 pointer-events-none"
                  style={{ background: "linear-gradient(105deg, transparent 30%, rgba(255,255,255,.07) 50%, transparent 70%)", backgroundSize: "200% 100%", animation: "voiceshine 3s linear infinite" }} />
                <div className="relative flex items-center justify-center gap-5">
                  <div className="relative w-12 h-12 flex items-center justify-center shrink-0">
                    <span className="absolute inset-0 rounded-full bg-violet-400/20 animate-ping" style={{ animationDuration: "2.4s" }} />
                    <span className="absolute inset-1.5 rounded-full bg-violet-400/20 animate-ping" style={{ animationDuration: "2.4s", animationDelay: ".5s" }} />
                    <span className="absolute inset-3 rounded-full bg-violet-300/30 animate-ping" style={{ animationDuration: "2.4s", animationDelay: "1s" }} />
                    <span className="relative text-3xl">🎤</span>
                  </div>
                  <div className="text-left">
                    <div className="flex items-center gap-2 mb-0.5">
                      <span className="voice-shine text-2xl font-black tracking-wide">AI 音声受付</span>
                      <span className="text-xs px-2 py-0.5 rounded-full font-bold text-white"
                        style={{ background: "linear-gradient(to right, #a855f7, #ec4899)" }}>Claude</span>
                    </div>
                    <div className="text-sm text-violet-300 font-medium">✨ お名前を話すだけで受付完了</div>
                  </div>
                </div>
              </button>
            </div>
          )}
        </div>

        {pickerOpen && (() => {
          // QR検出ハンドラ（カメラ・手動入力で共通）
          const handleQRToken = async (token) => {
            token = (token || "").trim();
            if (!token) return;
            setQrScanState("loading");
            const isUUID = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(token);
            const isHex24 = /^[0-9a-f]{24}$/i.test(token);
            if (isUUID || isHex24) {
              try {
                const res = await fetch(`/api/invitation?token=${encodeURIComponent(token)}`);
                if (res.ok) {
                  const data = await res.json();
                  if (data.status === "arrived") {
                    setQrScanState({ type: "used", msg: "このQRはすでに受付済みです" }); return;
                  }
                  setQrScanState(null);
                  setPickerOpen(false);
                  setQrSelectedInv({ id: data.id, visitorName: data.visitor_name,
                    company: data.company_name || "", host: data.host_name || "",
                    room: data.room || "", used: false });
                  setCountInput(1); setPurposeInput(""); return;
                } else if (res.status === 404) {
                  setQrScanState({ type: "notfound", msg: "招待状が見つかりません" }); return;
                }
              } catch(e) {
                setQrScanState({ type: "error", msg: "通信エラーが発生しました" }); return;
              }
            }
            // ローカル招待状から検索
            const found = db.invitations.find(i => !i.used && (i.code === token || i.id === token));
            if (found) {
              setQrScanState(null);
              setPickerOpen(false); setQrSelectedInv(found); setCountInput(1); setPurposeInput("");
            } else {
              setQrScanState({ type: "notfound", msg: "招待状が見つかりません" });
            }
          };
          const retryQR = () => { setQrScanState(null); setQrCamKey(k => k + 1); };
          return (
            <div className="absolute inset-0 bg-black/70 flex items-center justify-center p-6 pop"
                 onClick={() => { setPickerOpen(false); setQrScanState(null); }}>
              <div className="bg-white rounded-2xl p-5 w-full max-w-lg max-h-full overflow-y-auto" onClick={(e) => e.stopPropagation()}>
                <div className="flex items-center justify-between mb-3">
                  <div className="font-bold text-slate-800 text-lg">📷 QRコードで受付</div>
                  <button onClick={() => { setPickerOpen(false); setQrScanState(null); }} className="text-slate-400 text-xl leading-none">✕</button>
                </div>
                {/* カメラ or エラー表示 */}
                {qrScanState === "loading" ? (
                  <div className="flex flex-col items-center gap-3 py-10 bg-black rounded-xl">
                    <div className="w-10 h-10 border-4 border-sky-400 border-t-transparent rounded-full animate-spin" />
                    <p className="text-white/70 text-sm">確認中…</p>
                  </div>
                ) : qrScanState && qrScanState.type ? (
                  <div className="flex flex-col items-center gap-4 py-10 bg-slate-50 rounded-xl">
                    <div className="text-5xl">{qrScanState.type === "used" ? "✅" : "❌"}</div>
                    <p className="text-slate-700 font-semibold text-lg">{qrScanState.msg}</p>
                    {qrScanState.type === "used" ? (
                      <p className="text-slate-500 text-sm">このQRコードはすでにご利用いただいています</p>
                    ) : (
                      <p className="text-slate-500 text-sm">招待状が見つかりませんでした</p>
                    )}
                    <button onClick={retryQR}
                      className="mt-2 px-8 py-3 rounded-full bg-sky-500 text-white font-bold">
                      📷 再スキャン
                    </button>
                  </div>
                ) : (
                  <QRCamera key={qrCamKey} onDetect={handleQRToken} />
                )}
                <div className="mt-4 border-t pt-4">
                  <details>

        {qrSelectedInv && (

                <div className="text-slate-600 text-sm font-medium mb-2">人数</div>
                <div className="flex items-center gap-4">
                  <button onClick={() => setCountInput(Math.max(1, countInput - 1))}
                    className="w-10 h-10 rounded-xl bg-slate-100 text-slate-800 text-xl font-bold flex items-center justify-center">−</button>

                    className="w-10 h-10 rounded-xl bg-slate-100 text-slate-800 text-xl font-bold flex items-center justify-center">＋</button>

              <div className="mb-6">

  /* ---- 名刺撮影 ---- */
  if (screen === "card") {
    const handleCardCapture = async (dataURL) => {
      setCardImageDataURL(dataURL);
      setCardStep("scanning");
      setCardName(""); setCardCompany("");
      const apiKey = getApiKey();
      if (apiKey) {
        try {
          const result = await ocrBusinessCard(apiKey, dataURL);
          setCardName(result.name || "");
          setCardCompany(result.company || "");

      setCardStep("review");
    };

    return (
      <KioskShell>
        <Header title="名刺を撮影してください" onBack={() => { setScreen("visitor"); setCardStep("camera"); setCardImageDataURL(null); }} />
        <div className="flex-1 p-8 flex flex-col items-center overflow-y-auto" style={{ justifyContent: cardStep === "review" ? "flex-start" : "center" }}>
          {cardStep === "camera" && (
            <CardCamera onCapture={handleCardCapture} />

          {cardStep === "scanning" && (
            <div className="flex flex-col items-center gap-5">
              {cardImageDataURL && (
                <img src={cardImageDataURL} className="w-64 rounded-xl opacity-60 object-contain" style={{ maxHeight: "120px" }} alt="撮影した名刺" />

            </div>

          {cardStep === "review" && (
            <div className="w-full max-w-md pop">

                <div>
                  <label className="text-slate-300 text-sm">お名前 *</label>

                <div>
                  <label className="text-slate-300 text-sm">人数</label>

                    <span className="text-white text-xl font-bold w-10 text-center">{countInput}</span>
                    <button type="button" onClick={() => setCountInput(countInput + 1)}
                      className="w-10 h-10 rounded-xl bg-white/10 text-white text-xl font-bold border border-white/20 flex items-center justify-center">＋</button>
                    <span className="text-slate-400 text-sm">名</span>

                </div>
                <div>
                  <label className="text-slate-300 text-sm">要件</label>

                    {["打ち合わせ","商談","面接","納品","その他"].map(p => (
                      <button key={p} type="button" onClick={() => setPurposeInput(purposeInput === p ? "" : p)}
                        className={`px-3 py-2 rounded-xl text-sm font-medium border transition-colors ${purposeInput === p ? "bg-sky-500 border-sky-400 text-white" : "bg-white/10 border-white/20 text-slate-300"}`}>

  /* ---- 音声受付 ---- */
  if (screen === "voice") {
    const th = THEMES[db.settings.bgTheme || "obsidian"];
    return (
      <KioskShell bg={th.bg}>
        <Header title="音声で受付" onBack={() => {
          if (voiceRecogRef.current) { voiceRecogRef.current.stop(); voiceRecogRef.current = null; }

              <div className="text-6xl">🎤</div>
              <p className="text-xl text-slate-200 text-center">マイクに向かって話しかけてください</p>

              </div>

              <div className="min-h-16 px-6 py-3 rounded-xl bg-white/10 text-slate-200 text-lg max-w-md w-full text-center">

          {voiceStep === "processing" && (
            <div className="flex flex-col items-center gap-6 pop">
              <div className="w-16 h-16 border-4 border-sky-400 border-t-transparent rounded-full animate-spin" />

              <div className="px-6 py-3 rounded-xl bg-white/10 text-slate-300 text-base max-w-md">
                「{voiceTranscript}」
              </div>
            </div>
          )}

          {/* confirm */}
          {voiceStep === "confirm" && (
            <div className="w-full max-w-md pop">
              <div className="text-emerald-300 text-sm mb-4 flex items-center justify-center gap-2">
                ✓ 内容を認識しました。ご確認ください
              </div>
              <div className="space-y-3 mb-6">
                <div>
                  <label className="text-slate-400 text-xs">お名前 *</label>
                  <input value={voiceResult.visitorName}
                    onChange={e => setVoiceResult(v => ({...v, visitorName: e.target.value}))}
                    className="w-full mt-1 px-4 py-3 rounded-xl bg-white/10 text-white text-lg border border-white/20 focus:border-sky-400 outline-none" />
                </div>
                <div>
                  <label className="text-slate-400 text-xs">会社名</label>
                  <input value={voiceResult.company}
                    onChange={e => setVoiceResult(v => ({...v, company: e.target.value}))}
                    className="w-full mt-1 px-4 py-3 rounded-xl bg-white/10 text-white text-lg border border-white/20 focus:border-sky-400 outline-none" />
                </div>
                <div>
                  <label className="text-slate-400 text-xs">担当者</label>
                  <input value={voiceResult.host}
                    onChange={e => setVoiceResult(v => ({...v, host: e.target.value}))}
                    className="w-full mt-1 px-4 py-3 rounded-xl bg-white/10 text-white text-lg border border-white/20 focus:border-sky-400 outline-none" />
                </div>
                <div>
                  <label className="text-slate-400 text-xs">人数</label>
                  <div className="flex items-center gap-4 mt-1">
                    <button type="button" onClick={() => setCountInput(Math.max(1, countInput - 1))}
                      className="w-9 h-9 rounded-xl bg-white/10 text-white text-lg font-bold border border-white/20 flex items-center justify-center">−</button>
                    <span className="text-white text-xl font-bold w-9 text-center">{countInput}</span>
                    <button type="button" onClick={() => setCountInput(countInput + 1)}
                      className="w-9 h-9 rounded-xl bg-white/10 text-white text-lg font-bold border border-white/20 flex items-center justify-center">＋</button>
                    <span className="text-slate-400 text-sm">名</span>
                  </div>
                </div>
                <div>
                  <label className="text-slate-400 text-xs">要件</label>
                  <div className="flex flex-wrap gap-2 mt-1">
                    {["打ち合わせ","商談","面接","納品","その他"].map(p => (
                      <button key={p} type="button" onClick={() => setPurposeInput(purposeInput === p ? "" : p)}
                        className={`px-3 py-1.5 rounded-xl text-xs font-medium border transition-colors ${purposeInput === p ? "bg-sky-500 border-sky-400 text-white" : "bg-white/10 border-white/20 text-slate-300"}`}>
                        {p}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
              <div className="flex gap-2 flex-wrap">
                <button onClick={() => setVoiceStep("idle")}
                  className="flex-1 py-3 rounded-xl bg-white/10 border border-white/20 text-sm text-slate-300 flex items-center justify-center gap-1">

                </button>

                    setNameInput(voiceResult.visitorName || "");
                    setCompanyInput(voiceResult.company || "");
                    setVoiceStep("idle");
                    setScreen("keyboard");
                  }}
                  className="flex-1 py-3 rounded-xl bg-white/10 border border-white/20 text-sm text-slate-300 flex items-center justify-center gap-1">
                  ⌨️ キーボードで修正
                </button>
              </div>

                className="w-full py-4 rounded-xl bg-gradient-to-r from-sky-400 to-indigo-500 text-xl font-bold disabled:opacity-40 mt-1">
                受付する
              </button>
            </div>
          )}

          {/* error */}
          {voiceStep === "error" && (
            <div className="flex flex-col items-center gap-5 pop w-full max-w-sm">
              <div className="text-6xl">⚠️</div>
              <p className="text-slate-300 text-base text-center">{voiceError}</p>
              <div className="flex flex-col gap-3 w-full">
                <button onClick={() => setVoiceStep("idle")}
                  className="w-full py-4 rounded-xl bg-gradient-to-r from-sky-500 to-indigo-500 text-white font-bold text-lg flex items-center justify-center gap-2">
                  🎤 もう一度音声で試す
                </button>
                <button onClick={() => { setVoiceStep("idle"); setScreen("keyboard"); }}
                  className="w-full py-4 rounded-xl bg-white/10 border border-white/20 text-slate-300 font-medium flex items-center justify-center gap-2">
                  ⌨️ キーボードで入力する
                </button>
              </div>
            </div>
          )}
        </div>
      </KioskShell>
    );
  }

  /* ---- キーボード入力 ---- */
  if (screen === "keyboard") {
    return (
      <KioskShell>
        <Header title="お名前をご入力ください" onBack={() => setScreen("visitor")} />
        <div className="flex-1 p-10 flex flex-col items-center">
          <div className="w-full max-w-md space-y-4">
            <div>
              <label className="text-slate-300 text-sm">お名前 *</label>
              <input value={nameInput} onChange={(e) => setNameInput(e.target.value)} autoFocus
                placeholder="山田 太郎"
                className="w-full mt-1 px-4 py-3 rounded-xl bg-white/10 text-white text-lg border border-white/20 focus:border-sky-400 outline-none" />
            </div>
            <div>
              <label className="text-slate-300 text-sm">会社名（任意）</label>
              <input value={companyInput} onChange={(e) => setCompanyInput(e.target.value)}
                placeholder="株式会社サンプル"
                className="w-full mt-1 px-4 py-3 rounded-xl bg-white/10 text-white text-lg border border-white/20 focus:border-sky-400 outline-none" />
            </div>
            <div>
              <label className="text-slate-300 text-sm">人数</label>
              <div className="flex items-center gap-4 mt-2">
                <button type="button" onClick={() => setCountInput(Math.max(1, countInput - 1))}
                  className="w-12 h-12 rounded-xl bg-white/10 text-white text-2xl font-bold border border-white/20 flex items-center justify-center">−</button>
                <span className="text-white text-2xl font-bold w-12 text-center">{countInput}</span>
                <button type="button" onClick={() => setCountInput(countInput + 1)}
                  className="w-12 h-12 rounded-xl bg-white/10 text-white text-2xl font-bold border border-white/20 flex items-center justify-center">＋</button>
                <span className="text-slate-400 text-sm">名</span>
              </div>
            </div>
            <div>
              <label className="text-slate-300 text-sm">要件</label>
              <div className="flex flex-wrap gap-2 mt-2">
                {["打ち合わせ","商談","面接","納品","その他"].map(p => (
                  <button key={p} type="button" onClick={() => setPurposeInput(purposeInput === p ? "" : p)}
                    className={`px-4 py-2 rounded-xl text-sm font-medium border transition-colors ${purposeInput === p ? "bg-sky-500 border-sky-400 text-white" : "bg-white/10 border-white/20 text-slate-300"}`}>
                    {p}
                  </button>
                ))}
              </div>
            </div>
            <button onClick={handleKeyboard} disabled={!nameInput.trim()}
              className="w-full py-4 rounded-xl bg-gradient-to-r from-sky-400 to-indigo-500 text-white text-xl font-bold disabled:opacity-40 mt-2">
              受付する
            </button>
          </div>
        </div>
      </KioskShell>
    );
  }

  /* ---- 受付完了 ---- */
  if (screen === "done") {
    return (
      <KioskShell>
        <div className="flex-1 flex flex-col items-center justify-center text-center text-white px-10 pop">
          <div className="w-24 h-24 rounded-full bg-emerald-500 flex items-center justify-center text-5xl mb-6">✓</div>
          <div className="text-3xl font-bold mb-4">受付が完了しました</div>
          <div className="text-slate-200 text-lg whitespace-pre-line leading-relaxed">{doneMsg}</div>
          <div className="mt-10 text-sky-300 text-sm">💬 担当者へ通知しました</div>
        </div>
      </KioskShell>
    );
  }
  return null;
}

function KioskShell({ children, onClick, bg }) {
  return (
    <div onClick={onClick}
      className="relative w-full h-full flex flex-col overflow-hidden"
      style={{ background: bg || "linear-gradient(160deg,#050a14,#0a1428)" }}>
      {children}
    </div>
  );
}

function StandbyDecor({ theme: th }) {
  return (
    <div className="absolute inset-0 overflow-hidden pointer-events-none">
      {th.blobs.map((b, i) => (
        <div key={i} className="blob" style={{
          width: b.w, height: b.h,
          top: b.top, left: b.left, bottom: b.bottom, right: b.right,
          background: `radial-gradient(circle, ${b.color}, transparent 70%)`,
          animation: `slowdrift ${b.spd} ease-in-out infinite`,
        }} />
      ))}
    </div>
  );
}
function Header({ title, onBack }) {
  return (
    <div className="flex items-center gap-3 px-6 py-5 border-b border-white/10">
      <button onClick={onBack}
        className="w-10 h-10 rounded-full bg-white/10 text-white flex items-center justify-center text-xl">←</button>
      <div className="text-white text-xl font-bold">{title}</div>
    </div>
  );
}
function Corner({ pos }) {
  return <div className={"absolute w-6 h-6 border-t-2 border-l-2 border-sky-400 " + pos} />;
}
function BigButton({ emoji, label, sub, color, onClick }) {
  return (
    <button onClick={onClick}
      className={"rounded-3xl bg-gradient-to-br " + color + " text-white flex flex-col items-center justify-center p-6 shadow-xl active:scale-95 transition"}>
      <div className="text-6xl mb-4">{emoji}</div>
      <div className="text-2xl font-bold">{label}</div>
      <div className="text-sm opacity-90 mt-2 text-center">{sub}</div>
    </button>
  );
}

  const checkout = (log) => {
    const next = { ...db, logs: [{ id: uid(), ts: nowISO(), action: "退館", name: log.name,
      company: log.company, type: log.type, host: log.host }, ...db.logs] };
    setDB(next);

    const cols = ALL_COLUMNS.filter(c => visibleCols[c.key]);

/* ---- 会議室空き状況ヘルパー ---- */
// "HH:mm" → 時刻の小数表現 (例: "09:30" → 9.5)
function timeToH(str) {
  if (!str) return 0;
  const [h, m] = str.split(":").map(Number);
  return h + (m || 0) / 60;
}

// 指定日時に空いているか（デモ用）
function isRoomFree(room, date, timeStr) {
  const [h, m] = timeStr.split(":").map(Number);
  const t = h + m / 60;
  return !DEMO_BOOKINGS.some(b => b.room === room && t >= b.start && t < b.end);
}

function RoomsDashboard({ db }) {
  const [clock, setClock] = useState(new Date());
  useEffect(() => {
    const t = setInterval(() => setClock(new Date()), 60000);
    return () => clearInterval(t);
  }, []);
  const nowH = clock.getHours() + clock.getMinutes() / 60;
  const DISPLAY_HOURS = Array.from({ length: 13 }, (_, i) => i + 8); // 8〜20
  const rooms = db.settings.rooms || [];
  const avail = db.roomAvailability || {};
  const syncedAt = db.availSyncedAt;
  const hasAvailData = Object.keys(avail).length > 0;

  // h 時台にその部屋が使用中かチェック
  const isBusy = (room, h) =>
    (avail[room] || []).some(ev => h >= timeToH(ev.start) && h < timeToH(ev.end));

  // ツールチップ用: h 時台に重なる予定タイトルを返す
  const getEvent = (room, h) =>
    (avail[room] || []).find(ev => h >= timeToH(ev.start) && h < timeToH(ev.end));

  const fmtSync = syncedAt
    ? new Date(syncedAt).toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" })
    : null;

  return (
    <div>
      <div className="flex items-center justify-between mb-5">
        <h1 className="text-2xl font-bold text-slate-800">会議室</h1>
        <div className="text-right">
          {fmtSync
            ? <div className="text-xs text-slate-400">📡 最終同期: {fmtSync}</div>
            : <div className="text-xs text-amber-500">⚠️ 同期データなし — Apps Scriptで syncRoomAvailability を実行してください</div>
          }
        </div>
      </div>

      {/* 今すぐ使える — グリッド */}
      <div className="grid gap-3 mb-6" style={{ gridTemplateColumns: "repeat(auto-fill, minmax(160px, 1fr))" }}>
        {rooms.map(r => {
          const free = !isBusy(r, nowH);
          const events = avail[r] || [];
          // 次の予定を探す（現在時刻以降の最初の予定）
          const next = events
            .filter(ev => timeToH(ev.start) > nowH)
            .sort((a, b) => timeToH(a.start) - timeToH(b.start))[0];
          const currentEv = events.find(ev => nowH >= timeToH(ev.start) && nowH < timeToH(ev.end));
          return (
            <div key={r} className={"rounded-xl p-3 border " +
              (free ? "border-emerald-200 bg-emerald-50" : "border-rose-200 bg-rose-50")}>
              <div className={"inline-flex items-center gap-1 text-xs font-bold px-2 py-0.5 rounded-full mb-2 " +
                (free ? "bg-emerald-100 text-emerald-700" : "bg-rose-100 text-rose-600")}>
                <span className={"w-1.5 h-1.5 rounded-full " + (free ? "bg-emerald-500" : "bg-rose-500")} />
                {free ? "空き" : "使用中"}
              </div>
              <div className="text-sm font-semibold text-slate-800 leading-snug break-all mb-1">{r}</div>
              {!free && currentEv && (
                <div className="text-xs text-rose-500 truncate" title={currentEv.title}>
                  {currentEv.start}〜{currentEv.end}
                </div>
              )}
              {free && next && (
                <div className="text-xs text-slate-400">次: {next.start}〜</div>
              )}
              {!hasAvailData && (
                <div className="text-xs text-slate-300 mt-1">データなし</div>
              )}
            </div>
          );
        })}
        {rooms.length === 0 && (
          <p className="text-sm text-slate-400 col-span-full py-4">
            会議室が登録されていません。設定画面から同期してください。
          </p>
        )}
      </div>

      {/* タイムライン */}
      <Card className="p-6 overflow-x-auto">
        <div className="flex items-center justify-between mb-4">
          <div className="text-sm font-bold text-slate-700">
            本日のスケジュール（{clock.toLocaleDateString("ja-JP", { month: "long", day: "numeric", weekday: "short" })}）
          </div>
          {!hasAvailData && (
            <div className="text-xs text-amber-500 bg-amber-50 px-2 py-1 rounded-lg">
              設定 → Googleカレンダー連携 → syncRoomAvailability を実行してください
            </div>
          )}
        </div>
        <div className="min-w-[600px]">
          {/* 時刻ヘッダー */}
          <div className="flex mb-2 pl-36">
            {DISPLAY_HOURS.map(h => (
              <div key={h} className="flex-1 text-xs text-slate-400 text-center">{h}</div>
            ))}
          </div>
          {/* 各部屋 */}
          {rooms.map(room => (
            <div key={room} className="flex items-center mb-3 gap-2">
              <div className="w-32 text-xs font-medium text-slate-700 shrink-0 text-right pr-3 leading-snug">{room}</div>
              <div className="flex-1 flex h-9 rounded-lg overflow-hidden relative border border-slate-200">
                {DISPLAY_HOURS.map(h => {
                  const busy = isBusy(room, h);
                  const isNow = Math.floor(nowH) === h;
                  const ev = busy ? getEvent(room, h) : null;
                  return (
                    <div key={h} title={ev ? `${ev.start}〜${ev.end} ${ev.title || ""}` : ""}
                      className={"flex-1 relative " +
                        (busy ? "bg-rose-100" : "bg-emerald-50") +
                        (isNow ? " ring-2 ring-inset ring-sky-400" : "")}>
                      {busy && <div className="absolute inset-1 rounded bg-rose-300/60" />}
                    </div>
                  );
                })}
                {/* 現在時刻の縦線 */}
                {nowH >= 8 && nowH <= 20 && (
                  <div className="absolute top-0 bottom-0 w-0.5 bg-sky-500 z-10"
                    style={{ left: ((nowH - 8) / 12 * 100) + "%" }} />
                )}
              </div>
            </div>
          ))}
          {/* 凡例 */}
          <div className="flex gap-4 mt-2 text-xs text-slate-400">
            <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-emerald-100 inline-block border border-slate-200" />空き</span>
            <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-rose-200 inline-block" />予約あり（ホバーで詳細）</span>
            <span className="flex items-center gap-1"><span className="w-0.5 h-3 bg-sky-500 inline-block" />現在時刻</span>
          </div>
        </div>
      </Card>
    </div>
  );
}

// 画像を最大 240x120px にリサイズして base64 で返す
function resizeLogo(file) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const MAX_W = 240, MAX_H = 120;
      let w = img.width, h = img.height;
      if (w > MAX_W) { h = Math.round(h * MAX_W / w); w = MAX_W; }
      if (h > MAX_H) { w = Math.round(w * MAX_H / h); h = MAX_H; }
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL("image/png"));
    };
    img.onerror = () => { URL.revokeObjectURL(url); resolve(null); };
    img.src = url;
  });
}

function WebhookSetting() {
  const [url, setUrl]       = React.useState("");
  const [status, setStatus] = React.useState("idle"); // idle | saving | saved | error
  const [errMsg, setErrMsg] = React.useState("");
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    sb.from("reception_settings").select("value").eq("key", "webhook_url").maybeSingle()
      .then(({ data, error }) => {
        if (!error && data?.value !== undefined) {
          const v = data.value;
          // JSONB は JS 値として返ってくる。文字列なら使い、それ以外は空文字
          setUrl(typeof v === "string" ? v.replace(/^"|"$/g, "") : "");
        }
        setLoading(false);
      });
  }, []);

  const save = async () => {
    setStatus("saving");
    setErrMsg("");
    const { error } = await sb.from("reception_settings")
      .upsert({ key: "webhook_url", value: url.trim() }, { onConflict: "key" });
    if (error) {
      setStatus("error");
      setErrMsg(error.message);
      return;
    }
    setStatus("saved");
    setTimeout(() => setStatus("idle"), 2500);
  };

  if (loading) return <div className="text-xs text-slate-400">読み込み中…</div>;

  return (
    <div className="space-y-2">
      <div className="flex gap-2">
        <input value={url} onChange={e => setUrl(e.target.value)}
          placeholder="https://chat.googleapis.com/v1/spaces/..."
          className="flex-1 px-3 py-2 rounded-lg border border-slate-200 text-sm font-mono outline-none focus:border-sky-400" />
        <button onClick={save} disabled={status === "saving"}
          className={"px-4 py-2 rounded-lg text-sm font-medium transition-colors shrink-0 " +
            (status === "saved"  ? "bg-emerald-500 text-white" :
             status === "error"  ? "bg-red-500 text-white" :
             status === "saving" ? "bg-slate-400 text-white" :
             "bg-slate-800 text-white hover:bg-slate-700")}>
          {status === "saved" ? "✓ 保存しました" : status === "saving" ? "保存中…" : status === "error" ? "エラー" : "保存"}
        </button>
      </div>
      {status === "error" && <p className="text-xs text-red-500">❌ {errMsg}</p>}
      {url && status === "saved" && <p className="text-xs text-emerald-600">✓ Webhook URL を保存しました</p>}
      <p className="text-xs text-slate-400">Google Chat スペース → アプリと統合 → Webhook を追加 で取得できます</p>
    </div>
  );
}

function PinChanger() {
  const [cur,  setCur]  = useState("");
  const [next1, setNext1] = useState("");
  const [next2, setNext2] = useState("");
  const [msg,  setMsg]  = useState(null);
  const [saving, setSaving] = useState(false);

  const save = async () => {
    if (cur !== getAdminPin()) {
      setMsg({ ok: false, text: "現在のPINが違います" }); return;
    }
    if (!/^\d{4}$/.test(next1)) {
      setMsg({ ok: false, text: "新PINは4桁の数字で入力してください" }); return;
    }
    if (next1 !== next2) {
      setMsg({ ok: false, text: "新PINが一致しません" }); return;
    }
    setSaving(true);
    setAdminPin(next1); // localStorage + module変数
    await sb().from("reception_settings")
      .upsert({ key: "admin_pin", value: next1 }, { onConflict: "key" });
    setSaving(false);
    setCur(""); setNext1(""); setNext2("");
    setMsg({ ok: true, text: "☁️ PINを変更しました（クラウド保存）" });
    setTimeout(() => setMsg(null), 2500);
  };

  return (
    <div className="space-y-2">
      {[
        { label: "現在のPIN", val: cur,   set: setCur,   ph: "現在の4桁" },
        { label: "新しいPIN", val: next1, set: setNext1, ph: "新しい4桁" },
        { label: "新PIN（確認）", val: next2, set: setNext2, ph: "もう一度" },
      ].map(({ label, val, set, ph }) => (
        <div key={label} className="flex items-center gap-3">
          <label className="text-xs text-slate-500 w-28 shrink-0">{label}</label>
          <input type="password" inputMode="numeric" maxLength={4} value={val}
            onChange={e => set(e.target.value.replace(/\D/g,"").slice(0,4))}
            placeholder={ph}

        </div>
      ))}

        <p className={`text-xs font-medium ${msg.ok ? "text-emerald-600" : "text-red-500"}`}>{msg.text}</p>
      )}
      <button onClick={save} disabled={saving}
        className="px-4 py-2 rounded-lg bg-slate-800 text-white text-sm font-medium hover:bg-slate-700 disabled:opacity-50">
        {saving ? "保存中..." : "PINを変更"}
      </button>
    </div>
  );
}

/* ---- 会議室設定（Supabase reception_rooms と同期） ---- */
function RoomsSyncSetting({ onSync }) {
  const [rooms, setRooms]       = useState([]);
  const [loading, setLoading]   = useState(true);
  const [nameInput, setNameInput] = useState("");
  const [saving, setSaving]     = useState(false);

  useEffect(() => { loadRooms(); }, []);

  async function loadRooms() {
    setLoading(true);
    const { data } = await sb.from("reception_rooms").select("*").order("sort_order");
    const list = data || [];
    setRooms(list);
    if (onSync) onSync(list.filter(r => r.is_active).map(r => r.name));
    setLoading(false);
  }

  async function deleteRoom(id) {
    await sb.from("reception_rooms").delete().eq("id", id);
    await loadRooms();
  }

  async function addRoom() {
    const name = nameInput.trim();
    if (!name) return;
    setSaving(true);
    const maxOrder = rooms.reduce((m, r) => Math.max(m, r.sort_order || 0), 0);
    await sb.from("reception_rooms").insert({ name, is_active: true, sort_order: maxOrder + 1 });
    setNameInput("");
    await loadRooms();
    setSaving(false);
  }

  if (loading) return React.createElement("div", { className: "text-sm text-slate-400 py-2" }, "読み込み中...");

  return (
    <div className="space-y-4">
      {/* 既存会議室一覧 */}
      <div className="space-y-1.5">
        {rooms.map(r => (
          <div key={r.id} className="flex items-center gap-2 px-3 py-2 rounded-lg bg-slate-50 group">
            <span className="flex-1 text-sm font-medium text-slate-700">{r.name}</span>
            {r.calendar_id && (
              <span className="text-xs text-slate-400 font-mono truncate max-w-xs hidden sm:inline">
                {r.calendar_id.replace(/@resource\.calendar\.google\.com$/, "")}
              </span>
            )}
            {r.calendar_id
              ? <span className="text-xs px-1.5 py-0.5 rounded bg-sky-100 text-sky-600 shrink-0">GW同期済</span>
              : <span className="text-xs px-1.5 py-0.5 rounded bg-slate-100 text-slate-400 shrink-0">手動</span>
            }
            <button onClick={() => deleteRoom(r.id)}
              className="text-slate-300 hover:text-red-400 text-base leading-none ml-1">×</button>
          </div>
        ))}
        {rooms.length === 0 && (
          <p className="text-xs text-slate-400 py-2">会議室が登録されていません。下記の手順で同期するか、手動で追加してください。</p>
        )}
      </div>

      {/* 手動追加 */}
      <div className="flex gap-2">
        <input value={nameInput} onChange={e => setNameInput(e.target.value)}
          placeholder="会議室名を手動追加"
          onKeyDown={e => e.key === "Enter" && addRoom()}
          className="flex-1 px-3 py-2 rounded-lg border border-slate-200 outline-none focus:border-sky-400 text-sm" />
        <button onClick={addRoom} disabled={saving || !nameInput.trim()}
          className="px-4 py-2 rounded-lg bg-slate-800 text-white text-sm disabled:opacity-40">追加</button>
      </div>

      {/* Google Workspace 同期セクション */}
      <div className="bg-sky-50 rounded-xl p-4 space-y-2 border border-sky-100">
        <div className="font-medium text-sky-800 text-sm">🔄 Google Workspace リソースカレンダーから同期</div>
        <p className="text-xs text-slate-600">
          カレンダー連携用の Apps Script に <code className="bg-sky-100 px-1 rounded">syncRoomsToReception</code> 関数（下記）を追加し、
          手動で一度だけ実行すると Workspace の会議室が自動登録されます。
          以降はカレンダー連携スクリプトが会議室名を自動取得するので追加操作は不要です。
        </p>
        <ol className="text-xs text-slate-600 list-decimal list-inside space-y-0.5">
          <li>Googleカレンダー連携セクションの Apps Script に下記コードを<b>追記</b>して保存</li>
          <li>関数セレクタで <b>syncRoomsToReception</b> を選択 → ▶ 実行</li>
          <li>このページをリロードすると会議室が反映されます</li>
        </ol>
      </div>
    </div>
  );
}

    const host    = (desc.match(/担当[:：](.+)/) || [])[1]?.trim() || "";
    const email   = (desc.match(/メール[:：](.+)/) || [])[1]?.trim()
                 || ev.getGuestList().map(g => g.getEmail()).find(e => e);
    // 会議室: ① リソースゲスト（@resource.calendar.google.com）② 場所フィールド の順で取得
    // 末尾の容量表記 "(8)" などを除去してクリーンな名前にする
    const resourceGuest = ev.getGuestList()
      .find(g => g.getEmail().includes("@resource.calendar.google.com"));
    const rawRoom = resourceGuest
      ? (resourceGuest.getName() || resourceGuest.getEmail())
      : (ev.getLocation() || "");
    const room = rawRoom.replace(/\s*\(\d+\)\s*$/, "").trim();

    // 招待状を作成
    const res = UrlFetchApp.fetch(RECEPTION_URL, {
      method: "post",
      contentType: "application/json",
      muteHttpExceptions: true,
      payload: JSON.stringify({
        visitor_name: name, company_name: company,
        host_name: host, room: room || null, secret: SECRET,
        visit_date: Utilities.formatDate(ev.getStartTime(), "Asia/Tokyo", "yyyy-MM-dd"),
        visit_time: Utilities.formatDate(ev.getStartTime(), "Asia/Tokyo", "HH:mm"),
      }),
    });

    if (res.getResponseCode() !== 201) {
      Logger.log("API error " + res.getResponseCode() + ": " + res.getContentText());
      return;
    }

    const data      = JSON.parse(res.getContentText());
    const qrToken   = data.qr_token;
    const visitDt   = Utilities.formatDate(ev.getStartTime(), "Asia/Tokyo", "yyyy年MM月dd日 HH:mm");
    const inviteUrl = "https://reception-system-five.vercel.app/invite.html?token=" + encodeURIComponent(qrToken);
    const qrUrl     = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + encodeURIComponent(qrToken);

    // Chat 通知はサーバー側（/api/invitation）が自動送信するため Apps Script では不要

    // 来訪者にメールを送信（メールアドレスがある場合のみ）
    if (!email) return;
    const subject = "【受付QRコード】" + visitDt + " ご来社のご案内";
    const html = '<div style="font-family:sans-serif;max-width:480px;margin:0 auto;padding:24px">'
      + '<h2 style="color:#1e293b;margin-bottom:8px">ご来社のご案内</h2>'
      + '<p>' + name + ' 様</p>'
      + '<p style="color:#475569">下記日程でのご来社をお待ちしております。<br>受付端末にて QR コードをかざしてください。</p>'
      + '<table style="margin:16px 0;border-collapse:collapse;font-size:14px">'
      + '<tr><td style="padding:4px 16px 4px 0;color:#64748b">日時</td><td>' + visitDt + '</td></tr>'
      + (host ? '<tr><td style="padding:4px 16px 4px 0;color:#64748b">担当</td><td>' + host + '</td></tr>' : '')
      + (room ? '<tr><td style="padding:4px 16px 4px 0;color:#64748b">会議室</td><td>' + room + '</td></tr>' : '')
      + '</table>'
      + '<div style="text-align:center;padding:24px;background:#f8fafc;border-radius:12px;margin:16px 0">'
      + '<img src="' + qrUrl + '" width="240" height="240" alt="受付QRコード" style="display:block;margin:0 auto"/>'
      + '<p style="margin-top:12px;font-size:13px;color:#64748b">受付端末のカメラにかざしてください</p>'
      + '</div>'
      + '<p style="font-size:14px;margin-bottom:8px">📱 スマートフォンからはこちら</p>'
      + '<a href="' + inviteUrl + '" style="display:block;background:#0ea5e9;color:#fff;text-decoration:none;padding:12px;border-radius:8px;text-align:center;font-weight:bold">QRコードを表示する</a>'
      + '<p style="font-size:12px;color:#94a3b8;margin-top:24px">株式会社ユリーカ 受付システム</p>'
      + '</div>';
    GmailApp.sendEmail(email, subject, "受付QRコードをご確認ください", { htmlBody: html });
  });
}

function syncRoomAvailability() {
  const today     = new Date();
  const dateStr   = Utilities.formatDate(today, "Asia/Tokyo", "yyyy-MM-dd");
  const cals      = CalendarApp.getAllCalendars()
    .filter(c => c.getId().includes("@resource.calendar.google.com"));

  const rooms = cals.map(c => ({
    calendar_id: c.getId(),
    events: c.getEventsForDay(today).map(ev => ({
      title: ev.getTitle(),
      start: Utilities.formatDate(ev.getStartTime(), "Asia/Tokyo", "HH:mm"),
      end:   Utilities.formatDate(ev.getEndTime(),   "Asia/Tokyo", "HH:mm"),
    })),
  }));

  if (!rooms.length) {
    Logger.log("⚠️ リソースカレンダーが見つかりません（先に syncRoomsToReception を実行してください）");
    return;
  }

  const res = UrlFetchApp.fetch(AVAILABILITY_URL, {
    method:             "post",
    contentType:        "application/json",
    muteHttpExceptions: true,
    payload:            JSON.stringify({ date: dateStr, rooms, secret: SECRET }),
  });

  Logger.log("空き状況同期: " + res.getResponseCode()
    + " / " + rooms.length + "室 / "
    + rooms.map(r => r.calendar_id.split("@")[0] + "(" + r.events.length + "件)").join(", "));
}

// ── 会議室をリソースカレンダーから同期（手動で一度だけ実行） ──

function syncRoomsToReception() {
  const cals = CalendarApp.getAllCalendars();
  const rooms = cals
    .filter(c => c.getId().includes("@resource.calendar.google.com"))
    .map((c, i) => ({
      name:        c.getName().replace(/\\s*\\(\\d+\\)\\s*$/, "").trim(),
      calendar_id: c.getId(),
      capacity:    null,
      sort_order:  i,
    }));

  if (!rooms.length) {
    Logger.log("⚠️ リソースカレンダーが見つかりません。Googleカレンダーでリソースカレンダーを追加してください。");
    return;
  }

  const res = UrlFetchApp.fetch(SYNC_ROOMS_URL, {
    method:             "post",
    contentType:        "application/json",
    muteHttpExceptions: true,
    payload:            JSON.stringify({ rooms, secret: SECRET }),
  });

  if (res.getResponseCode() === 200) {
    Logger.log("✅ 同期完了: " + rooms.length + "件");
    rooms.forEach(r => Logger.log("  " + r.name + " / " + r.calendar_id));
  } else {
    Logger.log("❌ エラー: " + res.getResponseCode() + " " + res.getContentText());
  }

      <div className="w-10 h-10 border-4 border-sky-500 border-t-transparent rounded-full animate-spin" />

/* ============================ ルート ============================ */
function App() {
  const [db, setDBState] = useState(null);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState("kiosk"); // kiosk | admin
  const [toast, setToast] = useState(null);
  const [forceClosed, setForceClosed] = useState(false);
  const [showPinModal, setShowPinModal] = useState(false);
  const [pinInput, setPinInput] = useState("");
  const [pinError, setPinError] = useState(false);
  const [pinUnlocked, setPinUnlocked] = useState(false); // セッション中は一度解除で維持

  const openAdmin = () => {
    if (pinUnlocked) { setView("admin"); return; }
    setPinInput(""); setPinError(false); setShowPinModal(true);
  };
  const submitPin = () => {
    if (pinInput === getAdminPin()) {
      setPinUnlocked(true); setShowPinModal(false); setView("admin");
    } else {
      setPinError(true); setPinInput("");
      setTimeout(() => setPinError(false), 1500);
    }
  };
  const lockAdmin = () => { setPinUnlocked(false); setView("kiosk"); };
  const prevDBRef = useRef(null);

  // Supabase からデータをロード
  useEffect(() => {
    loadFromSupabase()
      .then(data => {
        setDBState(data);
        saveLocalDB(data);
        prevDBRef.current = data;
      })
      .catch(err => {
        console.warn("Supabase 接続失敗、localStorageを使用します:", err);
        const d = loadLocalDB();
        setDBState(d);
        prevDBRef.current = d;
      })
      .finally(() => setLoading(false));
  }, []);

  const setDB = (next) => {
    setDBState(next);
    saveLocalDB(next); // ローカルに即保存
    const prev = prevDBRef.current;
    prevDBRef.current = next;
    syncToSupabase(next, prev).catch(console.error); // Supabaseへ非同期同期
  };
  const notify = (msg) => { setToast(msg); setTimeout(() => setToast(null), 4000); };
  const reset = () => {
    setLoading(true);
    loadFromSupabase()
      .then(data => { setDBState(data); saveLocalDB(data); prevDBRef.current = data; })
      .catch(() => { const d = loadLocalDB(); setDBState(d); prevDBRef.current = d; })
      .finally(() => setLoading(false));
  };

  if (loading || !db) return <LoadingScreen />;

  return (
    <div className="min-h-screen flex flex-col">
      {/* デモ用ツールバー */}
      <div className="bg-slate-950 text-white px-5 py-3 flex items-center gap-4 flex-wrap">
        <span className="font-bold text-sky-400">受付システム ホットモック</span>
        <div className="flex rounded-lg overflow-hidden border border-white/20">
          <button onClick={() => setView("kiosk")}
            className={"px-4 py-1.5 text-sm " + (view === "kiosk" ? "bg-sky-500" : "bg-transparent")}>📱 受付端末</button>
          <button onClick={openAdmin}
            className={"px-4 py-1.5 text-sm " + (view === "admin" ? "bg-sky-500" : "bg-transparent")}>🖥 管理画面</button>
        </div>
        {view === "kiosk" && (
          <label className="flex items-center gap-2 text-sm text-slate-300">
            <input type="checkbox" checked={forceClosed} onChange={(e) => setForceClosed(e.target.checked)} />
            営業時間外をシミュレート
          </label>
        )}
        {view === "admin" && (
          <button onClick={lockAdmin} className="text-xs px-3 py-1.5 rounded-lg bg-white/10 hover:bg-white/20">
            🔒 管理画面をロック
          </button>
        )}
        <button onClick={reset} className="ml-auto text-xs px-3 py-1.5 rounded-lg bg-white/10 hover:bg-white/20">
          🔄 デモデータをリセット
        </button>
      </div>

      {/* PINモーダル */}
      {showPinModal && (
        <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50">
          <div className="bg-white rounded-2xl p-8 w-72 text-center shadow-2xl">
            <div className="text-3xl mb-2">🔒</div>
            <div className="font-bold text-slate-800 text-lg mb-1">管理画面</div>
            <div className="text-slate-500 text-sm mb-5">PINコードを入力してください</div>
            <div className="flex justify-center gap-2 mb-4">
              {[0,1,2,3].map(i => (
                <div key={i} className={`w-10 h-10 rounded-xl border-2 flex items-center justify-center text-xl font-bold transition-colors
                  ${pinError ? "border-red-400 bg-red-50 text-red-500" : pinInput.length > i ? "border-sky-400 bg-sky-50 text-sky-700" : "border-slate-200 text-transparent"}`}>
                  {pinInput.length > i ? "●" : "○"}
                </div>
              ))}
            </div>
            <div className="grid grid-cols-3 gap-2 mb-4">
              {["1","2","3","4","5","6","7","8","9","","0","⌫"].map((k,i) => (
                <button key={i} disabled={!k}
                  onClick={() => {
                    if (k === "⌫") { setPinInput(p => p.slice(0,-1)); return; }
                    const next = pinInput + k;
                    setPinInput(next);
                    if (next.length === 4) {
                      if (next === getPin()) { setPinUnlocked(true); setShowPinModal(false); setView("admin"); setPinInput(""); }
                      else { setPinError(true); setTimeout(() => { setPinError(false); setPinInput(""); }, 1000); }
                    }
                  }}
                  className={`h-12 rounded-xl text-lg font-semibold transition-colors
                    ${!k ? "invisible" : pinError ? "bg-red-50 text-red-400" : "bg-slate-100 hover:bg-slate-200 text-slate-800 active:scale-95"}`}>
                  {k}
                </button>
              ))}
            </div>
            <button onClick={() => { setShowPinModal(false); setPinInput(""); }}
              className="text-sm text-slate-400 hover:text-slate-600">キャンセル</button>
          </div>
        </div>
      )}

      {/* 本体 */}
      <div className="flex-1 flex items-center justify-center p-6">
        {view === "kiosk" ? (
          <div className="ipad-frame bg-black p-3 w-[900px] max-w-full">
            <div className="rounded-[26px] overflow-hidden h-[640px] relative">
              <Kiosk db={db} setDB={setDB} notify={notify} forceClosed={forceClosed} />
            </div>
          </div>
        ) : (
          <div className="w-full max-w-6xl h-[680px] rounded-2xl overflow-hidden shadow-2xl border border-slate-700">
            <Admin db={db} setDB={setDB} notify={notify} />
          </div>
        )}
      </div>

      <ChatToast toast={toast} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

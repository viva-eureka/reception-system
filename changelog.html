<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>リリースノート — 受付システム</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: #f8fafc;
    color: #1e293b;
    line-height: 1.7;
  }

  /* ── ヘッダー ── */
  .site-header {
    background: #1e293b;
    color: #fff;
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .site-header .logo {
    font-weight: 700;
    font-size: 15px;
    color: #fff;
    text-decoration: none;
    opacity: .85;
  }
  .site-header .sep { color: #64748b; }
  .site-header .title { font-size: 14px; color: #94a3b8; }
  .site-header .nav { margin-left: auto; display: flex; gap: 8px; }
  .site-header .nav a {
    font-size: 13px;
    padding: 5px 12px;
    border-radius: 6px;
    text-decoration: none;
    color: #94a3b8;
    transition: background .15s, color .15s;
  }
  .site-header .nav a:hover { background: #334155; color: #fff; }
  .site-header .nav a.active { background: #0ea5e9; color: #fff; }

  /* ── レイアウト ── */
  .layout {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ── Markdown スタイル ── */
  .markdown h1 {
    font-size: 1.75rem;
    font-weight: 700;
    margin: 0 0 32px;
    border-bottom: 2px solid #e2e8f0;
    padding-bottom: 12px;
  }

  /* バージョン見出し */
  .markdown h2 {
    font-size: 1.1rem;
    font-weight: 700;
    margin: 40px 0 16px;
    padding: 10px 16px;
    background: #f1f5f9;
    border-left: 4px solid #0ea5e9;
    border-radius: 0 8px 8px 0;
    color: #0f172a;
  }
  .markdown h2:first-of-type { margin-top: 0; }

  /* カテゴリ見出し */
  .markdown h3 {
    font-size: .9rem;
    font-weight: 700;
    margin: 16px 0 6px;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: .05em;
  }

  .markdown p { margin: 0 0 10px; }
  .markdown ul { padding-left: 1.4em; margin: 0 0 12px; }
  .markdown li { margin: 5px 0; font-size: .95rem; }
  .markdown li strong { color: #0f172a; }
  .markdown a { color: #0ea5e9; text-decoration: none; }
  .markdown a:hover { text-decoration: underline; }
  .markdown code {
    background: #f1f5f9;
    border: 1px solid #e2e8f0;
    border-radius: 4px;
    padding: 1px 5px;
    font-size: .85em;
    font-family: "SFMono-Regular", Consolas, monospace;
  }
  .markdown hr {
    border: none;
    border-top: 1px solid #e2e8f0;
    margin: 36px 0;
  }

  /* ── ローディング ── */
  .loading { text-align: center; padding: 60px; color: #94a3b8; }
</style>
</head>
<body>

<header class="site-header">
  <a class="logo" href="/">📋 受付システム</a>
  <span class="sep">›</span>
  <span class="title">ドキュメント</span>
  <nav class="nav">
    <a href="/guide.html">スタートアップガイド</a>
    <a href="/help.html">ヘルプ・Q&A・Tips</a>
    <a href="/changelog.html" class="active">リリースノート</a>
  </nav>
</header>

<div class="layout">
  <div id="content" class="markdown">
    <div class="loading">読み込み中…</div>
  </div>
</div>

<script>
fetch('/docs/changelog.md')
  .then(r => r.text())
  .then(md => {
    document.getElementById('content').innerHTML = marked.parse(md);
  })
  .catch(() => {
    document.getElementById('content').innerHTML =
      '<p style="color:#ef4444">ドキュメントの読み込みに失敗しました。</p>';
  });
</script>
</body>
</html>

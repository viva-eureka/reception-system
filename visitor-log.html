<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>来訪者ログ — 株式会社ユリーカ</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN",
                 "Hiragino Sans", "Noto Sans JP", Meiryo, sans-serif;
  }
  .badge-in  { background: #d1fae5; color: #065f46; }
  .badge-out { background: #f3f4f6; color: #6b7280; }

  .spinner { animation: spin 0.8s linear infinite; }
  th { white-space: nowrap; }
  td { vertical-align: middle; }
  .filter-btn.active, .afilter-btn.active-a {
    background-color: #1e3a8a;
    color: #ffffff;
  }
  .detail-btn { cursor: pointer; user-select: none; }
  .detail-row { display: none; }
  .detail-row.open { display: table-row; }
  #search-input:focus { outline: none; box-shadow: 0 0 0 2px #3b82f6; }
  .table-row:hover { background-color: #f8fafc; }
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Header -->
<header class="bg-white border-b border-gray-200 sticky top-0 z-20 shadow-sm">
  <div class="max-w-screen-xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between gap-3 flex-wrap">
    <div class="flex items-center gap-4">
      <a href="/" class="text-sm text-blue-600 hover:text-blue-800 flex items-center gap-1 whitespace-nowrap">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        受付端末へ
      </a>
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-lg bg-blue-900 flex items-center justify-center flex-shrink-0">
          <span class="text-white text-xs font-bold leading-none">YE</span>
        </div>
        <div>
          <div class="text-[10px] text-gray-400 leading-none">株式会社ユリーカ</div>
          <div class="text-base font-bold text-gray-900 leading-tight">来訪者ログ</div>
        </div>
      </div>
    </div>

    <div class="flex items-center gap-2 flex-wrap">
      <!-- Date filter -->

        <button data-filter="month"     class="filter-btn px-3 py-1.5 bg-white hover:bg-gray-50 border-l border-gray-200 transition-colors">今月</button>
        <button data-filter="all"       class="filter-btn px-3 py-1.5 bg-white hover:bg-gray-50 border-l border-gray-200 transition-colors">全件</button>
      </div>

      <!-- Search -->
      <div class="relative">
        <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>

        <input id="search-input" type="text" placeholder="氏名・会社で検索"

      <!-- CSV export -->

          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1M12 12v8M8 16l4 4 4-4M20 8V6a2 2 0 00-2-2H6a2 2 0 00-2 2v2"/>
        </svg>
        CSV

      <!-- Refresh indicator -->
      <div class="flex items-center gap-1.5 text-xs text-gray-400 whitespace-nowrap">
        <div id="refresh-icon" class="w-3.5 h-3.5 border-2 border-gray-300 border-t-blue-500 rounded-full"></div>
        <span id="refresh-label">自動更新 30s</span>

</header>

<!-- Tab navigation -->
<div class="bg-white border-b border-gray-200">
  <div class="max-w-screen-xl mx-auto px-4 sm:px-6 flex gap-0">

<!-- ═══ 来訪ログ ═══ -->
<div id="section-visit">

<!-- Stats bar -->

<!-- Table wrapper -->
<main class="max-w-screen-xl mx-auto px-4 sm:px-6 pb-12">
  <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">

    <!-- Loading state -->
    <div id="loading-state" class="flex flex-col items-center justify-center py-20 gap-3 text-gray-400">
      <div class="w-8 h-8 border-4 border-gray-200 border-t-blue-500 rounded-full spinner"></div>
      <span class="text-sm">データを読み込んでいます…</span>
    </div>

    <!-- Error state -->
    <div id="error-state" class="hidden flex-col items-center justify-center py-20 gap-3 text-red-400">
      <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
      </svg>
      <span id="error-msg" class="text-sm">データの取得に失敗しました</span>

        再試行

    </div>

    <!-- Empty state -->
    <div id="empty-state" class="hidden flex-col items-center justify-center py-20 gap-3 text-gray-400">
      <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
      </svg>
      <span class="text-sm">該当する来訪者はいません</span>
    </div>

    <!-- Data table -->
    <div id="table-wrapper" class="hidden overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-gray-100 bg-gray-50">
            <th class="text-left px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">日時</th>
            <th class="text-left px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">氏名</th>
            <th class="text-left px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide hidden sm:table-cell">会社</th>
            <th class="text-left px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">区分</th>
            <th class="text-left px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide hidden md:table-cell">担当</th>
            <th class="text-left px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide hidden lg:table-cell">人数</th>
            <th class="text-left px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide hidden lg:table-cell">要件</th>
            <th class="text-left px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide hidden md:table-cell">対応者</th>
            <th class="text-left px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">在館</th>
          </tr>
        </thead>
        <tbody id="visit-tbody"></tbody>
      </table>
    </div>

  </div>

  <!-- Footer note -->
  <p class="text-xs text-gray-400 text-center mt-4">
    最新200件表示 · 30秒ごとに自動更新
  </p>
</main>

</div><!-- /#section-visit -->

<!-- ═══ 監査ログ ═══ -->
<div id="section-audit" class="hidden">
<div class="max-w-screen-xl mx-auto px-4 sm:px-6 pt-4 pb-2 flex items-center justify-between">
  <div class="flex gap-4 text-sm text-gray-500">
    <span id="audit-stat-total" class="font-medium text-gray-900">—</span>
    <span id="audit-stat-range" class="text-xs text-gray-400"></span>
  </div>
  <div class="flex rounded-lg border border-gray-200 overflow-hidden text-sm">
    <button data-afilter="today" class="afilter-btn active-a px-3 py-1.5 bg-white hover:bg-gray-50">今日</button>
    <button data-afilter="week"  class="afilter-btn px-3 py-1.5 bg-white border-l border-gray-200 hover:bg-gray-50">今週</button>
    <button data-afilter="month" class="afilter-btn px-3 py-1.5 bg-white border-l border-gray-200 hover:bg-gray-50">今月</button>
    <button data-afilter="all"   class="afilter-btn px-3 py-1.5 bg-white border-l border-gray-200 hover:bg-gray-50">全件</button>
  </div>
</div>

<main class="max-w-screen-xl mx-auto px-4 sm:px-6 pb-12">
  <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
    <div id="audit-loading" class="flex flex-col items-center justify-center py-20 gap-3 text-gray-400">
      <div class="w-8 h-8 border-4 border-gray-200 border-t-blue-500 rounded-full spinner"></div>
      <span class="text-sm">読み込み中…</span>
    </div>
    <div id="audit-error" class="hidden flex-col items-center justify-center py-20 gap-3 text-red-400">
      <span id="audit-error-msg" class="text-sm">取得に失敗しました</span>
    </div>
    <div id="audit-empty" class="hidden flex-col items-center justify-center py-20 gap-3 text-gray-400">
      <span class="text-sm">監査ログはありません</span>
    </div>
    <div id="audit-table-wrapper" class="hidden overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-gray-100 bg-gray-50">
            <th class="text-left px-4 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wide">日時</th>
            <th class="text-left px-4 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wide">イベント</th>
            <th class="text-left px-4 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wide">操作者</th>
            <th class="text-left px-4 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wide hidden md:table-cell">対象</th>
            <th class="text-left px-4 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wide hidden lg:table-cell">IPアドレス</th>
            <th class="text-left px-4 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wide">詳細</th>
          </tr>
        </thead>
        <tbody id="audit-tbody"></tbody>
      </table>
    </div>
  </div>
  <p class="text-xs text-gray-400 text-center mt-4">最新500件表示</p>
</main>
</div><!-- /#section-audit -->

<script>
// ─── Supabase REST API (CDN 不要・fetch 直呼び) ───────────────────
const SUPABASE_URL = 'https://euseplsiazfwdirgbmwj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV1c2VwbHNpYXpmd2RpcmdibXdqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4ODY0MjAsImV4cCI6MjA5NjQ2MjQyMH0.qmqiZiYfPXCKNwC81rvh-ESZK4Wh7K92AVkPxUotRe4';

const SB_HEADERS = {
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json',
};

async function sbSelect(table, columns, extra = '') {
  const url = `${SUPABASE_URL}/rest/v1/${table}?select=${encodeURIComponent(columns)}${extra}`;
  const res = await fetch(url, { headers: SB_HEADERS });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`[${table}] ${res.status}: ${txt}`);
  }
  return res.json();
}

// ─── State ────────────────────────────────────────────────────────
let allVisits = [];          // raw from DB (merged with responders)
let activeFilter = 'today';
let searchQuery = '';
let refreshTimer = null;
let countdown = 30;
let countdownTimer = null;

// ─── DOM refs ─────────────────────────────────────────────────────
const loadingState  = document.getElementById('loading-state');
const errorState    = document.getElementById('error-state');
const emptyState    = document.getElementById('empty-state');
const tableWrapper  = document.getElementById('table-wrapper');
const tbody         = document.getElementById('visit-tbody');
const statTotal     = document.getElementById('stat-total');
const statInhouse   = document.getElementById('stat-inhouse');
const statRange     = document.getElementById('stat-range');
const errorMsg      = document.getElementById('error-msg');
const retryBtn      = document.getElementById('retry-btn');
const searchInput   = document.getElementById('search-input');
const csvBtn        = document.getElementById('csv-btn');
const refreshLabel  = document.getElementById('refresh-label');
const refreshIcon   = document.getElementById('refresh-icon');
const filterBtns    = document.querySelectorAll('.filter-btn');

// ─── Helpers ──────────────────────────────────────────────────────
function fmtDatetime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  const hh = String(d.getHours()).padStart(2, '0');
  const mi = String(d.getMinutes()).padStart(2, '0');
  return `${mm}/${dd} ${hh}:${mi}`;
}

const VISIT_TYPE_LABELS = {
  invited:  '予約',
  walkin:   '来訪',
  delivery: '配送',
  voice:    '音声',
};

function visitTypeLabel(type) {
  return VISIT_TYPE_LABELS[type] || type || '—';
}

const VISIT_TYPE_COLORS = {
  invited:  'bg-blue-50 text-blue-700',
  walkin:   'bg-purple-50 text-purple-700',
  delivery: 'bg-amber-50 text-amber-700',
  voice:    'bg-teal-50 text-teal-700',
};

function visitTypeColor(type) {
  return VISIT_TYPE_COLORS[type] || 'bg-gray-100 text-gray-600';
}

function escapeHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ─── Date range helpers ───────────────────────────────────────────
function getDateRange(filter) {
  const now = new Date();
  if (filter === 'today') {
    const start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const end   = new Date(start.getTime() + 86400000);
    return { start, end, label: `今日 ${fmtDateOnly(start)}` };
  }
  if (filter === 'week') {
    const day = now.getDay(); // 0=Sun
    const monday = new Date(now);
    monday.setDate(now.getDate() - ((day + 6) % 7));
    monday.setHours(0, 0, 0, 0);
    const nextMon = new Date(monday.getTime() + 7 * 86400000);
    return { start: monday, end: nextMon, label: `今週 ${fmtDateOnly(monday)}〜` };
  }
  if (filter === 'month') {
    const start = new Date(now.getFullYear(), now.getMonth(), 1);
    const end   = new Date(now.getFullYear(), now.getMonth() + 1, 1);
    return { start, end, label: `今月 ${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}` };
  }
  return { start: null, end: null, label: '全件' };
}

function fmtDateOnly(d) {
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

// ─── Fetch data ───────────────────────────────────────────────────
async function fetchData() {
  setUIState('loading');
  try {
    // 1. Fetch visits (新しい順・最大200件)
    const visits = await sbSelect(
      'reception_visits',
      'id,visitor_name,company_name,visit_type,host_name,person_count,visit_purpose,checked_in_at,checked_out_at',
      '&order=checked_in_at.desc&limit=200'
    );

    if (!visits || visits.length === 0) {
      allVisits = [];
      renderTable();
      return;
    }

    // 2. Fetch responders for these visit IDs
    const visitIds = visits.map(v => v.id).join(',');
    const responders = await sbSelect(
      'reception_responders',
      'visit_id,responder_name,responder_email,response_type,responded_at',
      `&visit_id=in.(${visitIds})`
    );

    // 3. Build a map: visit_id → first responder
    const responderMap = {};
    (responders || []).forEach(r => {
      if (!responderMap[r.visit_id]) responderMap[r.visit_id] = r;
    });

    // 4. Merge
    allVisits = visits.map(v => ({ ...v, responder: responderMap[v.id] || null }));

    renderTable();
  } catch (err) {
    console.error('Fetch error:', err);
    errorMsg.textContent = err.message || 'データの取得に失敗しました';
    setUIState('error');
  }
}

// ─── Filter + render ──────────────────────────────────────────────
function getFilteredVisits() {
  const range = getDateRange(activeFilter);
  let rows = allVisits;

  if (range.start) {
    rows = rows.filter(v => {
      if (!v.checked_in_at) return false;
      const t = new Date(v.checked_in_at);
      return t >= range.start && t < range.end;
    });
  }

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    rows = rows.filter(v =>
      (v.visitor_name  || '').toLowerCase().includes(q) ||
      (v.company_name  || '').toLowerCase().includes(q)
    );
  }

  return rows;
}

function renderTable() {
  const rows = getFilteredVisits();
  const range = getDateRange(activeFilter);

  // Update stats
  const inhouse = rows.filter(v => !v.checked_out_at).length;
  statTotal.textContent   = `${rows.length} 件`;
  statInhouse.textContent = `${inhouse} 名在館中`;
  statRange.textContent   = range.label;

  if (rows.length === 0) {
    setUIState('empty');
    return;
  }

  tbody.innerHTML = rows.map(v => {
    const respName  = v.responder ? escapeHtml(v.responder.responder_name) : '—';
    const inhouse   = !v.checked_out_at;
    const badgeClass = inhouse ? 'badge-in' : 'badge-out';
    const badgeText  = inhouse ? '在館中' : '退館';
    const typeColor  = visitTypeColor(v.visit_type);

    return `<tr class="table-row border-b border-gray-50 last:border-0">
      <td class="px-4 py-3 text-gray-500 text-xs font-mono tabular-nums">${fmtDatetime(v.checked_in_at)}</td>
      <td class="px-4 py-3 font-medium text-gray-900">${escapeHtml(v.visitor_name) || '—'}</td>
      <td class="px-4 py-3 text-gray-600 hidden sm:table-cell max-w-[140px] truncate" title="${escapeHtml(v.company_name)}">${escapeHtml(v.company_name) || '—'}</td>
      <td class="px-4 py-3">
        <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium ${typeColor}">
          ${visitTypeLabel(v.visit_type)}
        </span>
      </td>
      <td class="px-4 py-3 text-gray-600 hidden md:table-cell">${escapeHtml(v.host_name) || '—'}</td>
      <td class="px-4 py-3 text-gray-600 hidden lg:table-cell">${v.person_count != null ? `${v.person_count}名` : '—'}</td>
      <td class="px-4 py-3 text-gray-600 hidden lg:table-cell max-w-[160px] truncate" title="${escapeHtml(v.visit_purpose)}">${escapeHtml(v.visit_purpose) || '—'}</td>
      <td class="px-4 py-3 text-gray-600 hidden md:table-cell">${respName}</td>
      <td class="px-4 py-3">
        <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium ${badgeClass}">
          ${badgeText}
        </span>
      </td>
    </tr>`;
  }).join('');

  setUIState('table');
}

// ─── UI state management ──────────────────────────────────────────
function setUIState(state) {
  loadingState.className = 'hidden';
  errorState.className   = 'hidden';
  emptyState.className   = 'hidden';
  tableWrapper.className = 'hidden';

  if (state === 'loading') {
    loadingState.className = 'flex flex-col items-center justify-center py-20 gap-3 text-gray-400';
  } else if (state === 'error') {
    errorState.className = 'flex flex-col items-center justify-center py-20 gap-3 text-red-400';
  } else if (state === 'empty') {
    emptyState.className = 'flex flex-col items-center justify-center py-20 gap-3 text-gray-400';
  } else if (state === 'table') {
    tableWrapper.className = 'overflow-x-auto';
  }
}

// ─── CSV export ───────────────────────────────────────────────────
function exportCSV() {
  const rows = getFilteredVisits();
  if (rows.length === 0) return;

  const headers = ['日時', '氏名', '会社', '区分', '担当', '人数', '要件', '対応者', '在館'];
  const csvRows = [headers];

  rows.forEach(v => {
    csvRows.push([
      fmtDatetime(v.checked_in_at),
      v.visitor_name || '',
      v.company_name || '',
      visitTypeLabel(v.visit_type),
      v.host_name || '',
      v.person_count != null ? `${v.person_count}名` : '',
      v.visit_purpose || '',
      v.responder ? (v.responder.responder_name || '') : '',
      v.checked_out_at ? '退館' : '在館中',
    ]);
  });

  const csvContent = '﻿' + csvRows.map(r =>
    r.map(cell => `"${String(cell).replace(/"/g, '""')}"`)
     .join(',')
  ).join('\r\n');

  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const now  = new Date();
  const stamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  a.href     = url;
  a.download = `来訪者ログ_${stamp}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ─── Auto-refresh countdown ───────────────────────────────────────
function startCountdown() {
  clearInterval(countdownTimer);
  countdown = 30;
  refreshLabel.textContent = `自動更新 ${countdown}s`;
  refreshIcon.classList.remove('spinner');

  countdownTimer = setInterval(() => {
    countdown--;
    if (countdown <= 0) {
      refreshLabel.textContent = '更新中…';
      refreshIcon.classList.add('spinner');
    } else {
      refreshLabel.textContent = `自動更新 ${countdown}s`;
    }
  }, 1000);
}

function scheduleAutoRefresh() {
  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(async () => {
    await fetchData();
    startCountdown();
    scheduleAutoRefresh();
  }, 30000);
}

// ─── Event listeners ──────────────────────────────────────────────
filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderTable();
  });
});

searchInput.addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  renderTable();
});

csvBtn.addEventListener('click', exportCSV);

retryBtn.addEventListener('click', async () => {
  await fetchData();
  startCountdown();
  scheduleAutoRefresh();
});

// ─── タブ切り替え ─────────────────────────────────────────────────
let auditLoaded = false;
function switchTab(tab) {
  const isVisit = tab === 'visit';
  document.getElementById('section-visit').classList.toggle('hidden', !isVisit);
  document.getElementById('section-audit').classList.toggle('hidden',  isVisit);
  document.getElementById('tab-visit').classList.toggle('border-blue-600', isVisit);
  document.getElementById('tab-visit').classList.toggle('text-blue-700',   isVisit);
  document.getElementById('tab-visit').classList.toggle('border-transparent', !isVisit);
  document.getElementById('tab-visit').classList.toggle('text-gray-500',   !isVisit);
  document.getElementById('tab-audit').classList.toggle('border-blue-600', !isVisit);
  document.getElementById('tab-audit').classList.toggle('text-blue-700',   !isVisit);
  document.getElementById('tab-audit').classList.toggle('border-transparent', isVisit);
  document.getElementById('tab-audit').classList.toggle('text-gray-500',    isVisit);
  if (!isVisit && !auditLoaded) { auditLoaded = true; fetchAuditData(); }
}

// ─── 監査ログ ─────────────────────────────────────────────────────
let allAuditLogs = [];
let activeAFilter = 'today';

const AUDIT_LABELS = {
  visit_checkin:    { label: '来訪受付',  icon: '🙋', color: 'bg-blue-50 text-blue-700'   },
  delivery_checkin: { label: '配送受付',  icon: '📦', color: 'bg-amber-50 text-amber-700' },
  handle_response:  { label: '対応',      icon: '✅', color: 'bg-green-50 text-green-700' },
  delegate_request: { label: '対応依頼',  icon: '📨', color: 'bg-yellow-50 text-yellow-700' },
  log_viewed:       { label: 'ログ閲覧',  icon: '👁', color: 'bg-gray-100 text-gray-600'  },
  settings_changed: { label: '設定変更',  icon: '⚙️', color: 'bg-purple-50 text-purple-700' },
};

function auditLabel(action) {
  return AUDIT_LABELS[action] || { label: action, icon: '📝', color: 'bg-gray-100 text-gray-600' };
}

function auditTarget(row) {
  const d = row.new_data || {};
  if (row.action === 'visit_checkin')    return d.visitorName ? `${d.visitorName}${d.company ? '（'+d.company+'）' : ''}` : '—';
  if (row.action === 'delivery_checkin') return '配送業者';
  if (row.action === 'handle_response' || row.action === 'delegate_request')
    return d.visitor ? `${d.visitor}${d.company ? '（'+d.company+'）' : ''}` : '—';
  if (row.action === 'log_viewed')       return '来訪者ログ';
  if (row.action === 'settings_changed') return d.key || '設定';
  return row.table_name || '—';
}

async function fetchAuditData() {
  setAuditUI('loading');
  try {
    const logs = await sbSelect(
      'reception_audit_logs',
      'id,action,actor_name,user_email,new_data,ip_address,created_at',
      '&order=created_at.desc&limit=500'
    );
    allAuditLogs = logs || [];
    renderAuditTable();
  } catch (err) {
    document.getElementById('audit-error-msg').textContent = err.message;
    setAuditUI('error');
  }
}

function getAuditFiltered() {
  const range = getDateRange(activeAFilter);
  let rows = allAuditLogs;
  if (range.start) {
    rows = rows.filter(r => {
      const t = new Date(r.created_at);
      return t >= range.start && t < range.end;
    });
  }
  return rows;
}

function renderAuditTable() {
  const rows = getAuditFiltered();
  const range = getDateRange(activeAFilter);
  document.getElementById('audit-stat-total').textContent = `${rows.length} 件`;
  document.getElementById('audit-stat-range').textContent = range.label;

  if (rows.length === 0) { setAuditUI('empty'); return; }

  document.getElementById('audit-tbody').innerHTML = rows.map((r, i) => {
    const lbl    = auditLabel(r.action);
    const actor  = r.actor_name || r.user_email || '—';
    const target = escapeHtml(auditTarget(r));
    const detail = r.new_data ? JSON.stringify(r.new_data, null, 2) : '—';
    return `
      <tr class="table-row border-b border-gray-50 last:border-0">
        <td class="px-4 py-3 text-gray-500 text-xs font-mono tabular-nums whitespace-nowrap">${fmtDatetime(r.created_at)}</td>
        <td class="px-4 py-3">
          <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs font-medium ${lbl.color}">
            ${lbl.icon} ${lbl.label}
          </span>
        </td>
        <td class="px-4 py-3 text-gray-700 text-sm">${escapeHtml(actor)}</td>
        <td class="px-4 py-3 text-gray-600 text-sm hidden md:table-cell">${target}</td>
        <td class="px-4 py-3 text-gray-400 text-xs font-mono hidden lg:table-cell">${escapeHtml(r.ip_address || '—')}</td>
        <td class="px-4 py-3">
          <button class="detail-btn text-xs text-blue-500 hover:text-blue-700" onclick="toggleDetail('d${i}')">▶ 詳細</button>
        </td>
      </tr>
      <tr id="d${i}" class="detail-row bg-slate-50">
        <td colspan="6" class="px-6 py-3">
          <pre class="text-xs text-slate-600 whitespace-pre-wrap break-all">${escapeHtml(detail)}</pre>
        </td>
      </tr>`;
  }).join('');
  setAuditUI('table');
}

function toggleDetail(id) {
  const row = document.getElementById(id);
  const btn = row.previousElementSibling.querySelector('.detail-btn');
  const open = row.classList.toggle('open');
  btn.textContent = open ? '▼ 詳細' : '▶ 詳細';
}

function setAuditUI(state) {
  ['audit-loading','audit-error','audit-empty','audit-table-wrapper'].forEach(id =>
    document.getElementById(id).className = 'hidden'
  );
  if (state === 'loading') document.getElementById('audit-loading').className = 'flex flex-col items-center justify-center py-20 gap-3 text-gray-400';
  else if (state === 'error') document.getElementById('audit-error').className = 'flex flex-col items-center justify-center py-20 gap-3 text-red-400';
  else if (state === 'empty') document.getElementById('audit-empty').className = 'flex flex-col items-center justify-center py-20 gap-3 text-gray-400';
  else if (state === 'table') document.getElementById('audit-table-wrapper').className = 'overflow-x-auto';
}

document.querySelectorAll('.afilter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.afilter-btn').forEach(b => b.classList.remove('active-a'));
    btn.classList.add('active-a');
    activeAFilter = btn.dataset.afilter;
    renderAuditTable();
  });
});

// ─── 監査ログ：ページアクセス ─────────────────────────────────────
async function logPageAccess() {
  try {
    await fetch('/api/audit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action:    'log_viewed',
        table_name: 'reception_audit_logs',
        new_data:  { page: 'visitor-log', referrer: document.referrer || null },
      }),
    });
  } catch (e) { /* ログ失敗は無視 */ }
}

// ─── Boot ─────────────────────────────────────────────────────────
(async () => {
  logPageAccess(); // 非同期・失敗しても続行
  await fetchData();
  startCountdown();
  scheduleAutoRefresh();
})();
</script>
